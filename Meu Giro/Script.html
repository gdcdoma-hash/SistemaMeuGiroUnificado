function syncGlobalBusyState() {
  const root = document.body;
  if (!root) return;

  const isBusy = loginInProgress
    || painelLoadInProgress
    || rankingLoadInProgress
    || phraseLoadInProgress
    || activityMutationInProgress;

  root.classList.toggle('app-busy', isBusy);
}

function showScreen(name) {
  const screens = document.querySelectorAll('.screen');
  screens.forEach(function(screen) {
    screen.classList.remove('active');
  });

  const target = document.getElementById('screen-' + name);
  if (target) {
    target.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    persistirEstadoPainel({
      tela: String(name || '').trim()
    });
  }
}

function onlyDigits(value) {
  return String(value || '').replace(/\D/g, '');
}

function readInputValue(inputEl) {
  return String((inputEl && inputEl.value) || '').trim();
}

function sanitizeKmInputValue(value) {
  var cleaned = String(value || '')
    .replace(/\s+/g, '')
    .replace(/[^0-9.,]/g, '');
  var out = '';
  var sepUsed = false;

  for (var i = 0; i < cleaned.length; i++) {
    var ch = cleaned.charAt(i);
    if (/\d/.test(ch)) {
      out += ch;
      continue;
    }

    if ((ch === '.' || ch === ',') && !sepUsed && out.length > 0) {
      out += ch;
      sepUsed = true;
    }
  }

  return out;
}

  const btn = getRegistroSubmitButton();

  registroSubmitGuardActive = false;

  if (registroTapFeedbackTimer) {
    clearTimeout(registroTapFeedbackTimer);
    registroTapFeedbackTimer = null;

  btn.classList.remove('is-pressed', 'is-instant-loading', 'tap-feedback');

function triggerRegistroTapFeedback() {

function getRegistroBusyMessage() {
  const saveBtn = getRegistroSubmitButton();

  return handler.indexOf('salvarEdicaoAtividade') !== -1

function activateRegistroSubmitGuard() {
  const btn = getRegistroSubmitButton();

  if (!btn || btn.disabled || activityMutationInProgress || registroSubmitGuardActive) {
    return false;
  }

  registroSubmitGuardActive = true;
  btn.classList.add('is-instant-loading');
  return true;
}

function setupRegistroSubmitProtection() {
  const btn = getRegistroSubmitButton();
  if (!btn || btn.dataset.submitProtectionReady === 'true') return;

  btn.dataset.submitProtectionReady = 'true';

  btn.addEventListener('pointerdown', function(event) {
    if (event.button !== undefined && event.button !== 0) return;
    if (btn.disabled) return;

    triggerRegistroTapFeedback();
    setRegistroPressedState(true);
  });

  ['pointerup', 'pointercancel', 'pointerleave', 'blur'].forEach(function(eventName) {
    btn.addEventListener(eventName, function() {
      if (!registroSubmitGuardActive) {
        setRegistroPressedState(false);
      }
    });
  });

  btn.addEventListener('click', function(event) {
    if (btn.disabled || activityMutationInProgress || registroSubmitGuardActive) {
      event.preventDefault();
      event.stopImmediatePropagation();
      setRegistroPressedState(false);
      setRegistroMsg(getRegistroBusyMessage(), 'loading');
      return;
    }

    activateRegistroSubmitGuard();
  }, true);
}

function setupCancelEditTouchFeedback() {
  const btn = getCancelEditButton();
  if (!btn || btn.dataset.touchFeedbackReady === 'true') return;

  btn.dataset.touchFeedbackReady = 'true';

  btn.addEventListener('pointerdown', function(event) {
    if (event.button !== undefined && event.button !== 0) return;
    if (btn.disabled) return;

    triggerCancelEditTouchFeedback();
    btn.classList.add('is-pressed');
  });

  ['pointerup', 'pointercancel', 'pointerleave', 'blur'].forEach(function(eventName) {
    btn.addEventListener(eventName, function() {
      btn.classList.remove('is-pressed');
    });
  });
}

function startLoadingState(btn, msg, loadingText) {
  const text = String(loadingText || 'Processando...');
  let finalized = false;

  if (msg) msg.innerText = text;
  if (btn) btn.disabled = true;

  return function finishLoadingState(nextMessage) {
    if (finalized) return;
    finalized = true;

    if (btn) btn.disabled = false;

    if (msg && typeof nextMessage === 'string') {
      msg.innerText = nextMessage;
    }
  };
}

function setTransientStatus(elementId, message, variant, timeoutMs) {
  const el = document.getElementById(elementId);
  if (!el) return;

  if (statusMessageTimers[elementId]) {
    clearTimeout(statusMessageTimers[elementId]);
    delete statusMessageTimers[elementId];
  }

  const text = String(message || '').trim();
  el.innerText = text;
  el.className = 'msg status-msg';

  if (!text) {
    return;
  }

  el.classList.add('is-visible');

  if (variant === 'loading') {
    el.classList.add('msg-loading');
  } else if (variant === 'error') {
    el.classList.add('msg-error');
  } else if (variant === 'success') {
    el.classList.add('msg-success');
  }

  if (Number(timeoutMs) > 0) {
    statusMessageTimers[elementId] = setTimeout(function() {
      if (el) {
        el.innerText = '';
        el.className = 'msg status-msg';
      }
      delete statusMessageTimers[elementId];
    }, Number(timeoutMs));
  }
}


function buildDesafioCertificadoDomId(prefix, desafio) {
  var baseKey = getDesafioBaseKey_(desafio) || [
    String((desafio && desafio.id_desafio) || '').trim(),
    String((desafio && desafio.id_item_estoque) || '').trim(),
    String((desafio && desafio.nome_desafio) || '').trim()
  ].join('|');

  var slug = String(baseKey || '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 48);

  if (!slug) slug = 'desafio';
  return String(prefix || 'certificado') + '-' + slug;
}

function persistirSessaoLogin(user) {
  var id = String(user && user.id_dgmb || '').trim();
  if (!id) return;
  var nome = String(user && user.nome || '').trim();
  var cidadeUf = String(user && user.cidade_uf || '').trim();

  try {
    localStorage.setItem(LOGIN_SESSION_STORAGE_KEY, JSON.stringify({
      id_dgmb: id,
      nome: nome,
      cidade_uf: cidadeUf
    }));
  } catch (err) {
    console.warn('Não foi possível persistir a sessão de login.', err);
  }
}

function limparSessaoLoginPersistida() {
  try {
    localStorage.removeItem(LOGIN_SESSION_STORAGE_KEY);
  } catch (err) {
    console.warn('Não foi possível limpar a sessão persistida.', err);
  }
}

function recuperarSessaoLoginPersistida() {
  try {
    var raw = localStorage.getItem(LOGIN_SESSION_STORAGE_KEY);
    if (!raw) return null;

    var parsed = JSON.parse(raw);
    var id = String(parsed && parsed.id_dgmb || '').trim();
    if (!id) return null;

    return {
      id_dgmb: id,
      nome: String(parsed && parsed.nome || '').trim(),
      cidade_uf: String(parsed && parsed.cidade_uf || '').trim()
    };
  } catch (err) {
    console.warn('Não foi possível recuperar a sessão persistida.', err);
    return null;
  }
}

function persistirEstadoPainel(partialState) {
  try {
    var stateAtual = recuperarEstadoPainelPersistido() || {};
    var partial = partialState || {};
    var proximoEstado = {
      tela: stateAtual.tela || 'painel',
      desafio_em_foco: stateAtual.desafio_em_foco || ''
    };
    var tela = String(partial.tela || '').trim();
    var desafio = String(partial.desafio_em_foco || '').trim();

    if (tela) {
      proximoEstado.tela = tela;
    }
    if (partial.hasOwnProperty('desafio_em_foco')) {
      proximoEstado.desafio_em_foco = desafio;
    }

    if (!TELAS_RELEVANTES_SESSAO[proximoEstado.tela]) {
      proximoEstado.tela = 'painel';
    }

    localStorage.setItem(PAINEL_STATE_STORAGE_KEY, JSON.stringify(proximoEstado));
  } catch (err) {
    console.warn('Não foi possível persistir o estado do painel.', err);
  }
}

function limparEstadoPainelPersistido() {
  try {
    localStorage.removeItem(PAINEL_STATE_STORAGE_KEY);
  } catch (err) {
    console.warn('Não foi possível limpar o estado persistido do painel.', err);
  }
}

function recuperarEstadoPainelPersistido() {
  try {
    var raw = localStorage.getItem(PAINEL_STATE_STORAGE_KEY);
    if (!raw) return null;

    var parsed = JSON.parse(raw);
    var tela = String(parsed && parsed.tela || '').trim();
    var desafio = String(parsed && parsed.desafio_em_foco || '').trim();

    if (!TELAS_RELEVANTES_SESSAO[tela]) {
      tela = 'painel';
    }

    return {
      tela: tela || 'painel',
      desafio_em_foco: desafio
    };
  } catch (err) {
    console.warn('Não foi possível recuperar o estado persistido do painel.', err);
    return null;
  }
}

function tentarRestaurarSessaoPersistida() {
  var sessao = recuperarSessaoLoginPersistida();
  if (!sessao || !sessao.id_dgmb) return false;
  var estadoPainel = recuperarEstadoPainelPersistido();
  telaPrivadaRestaurada = estadoPainel && estadoPainel.tela ? estadoPainel.tela : 'painel';

  if (estadoPainel && estadoPainel.desafio_em_foco) {
    desafioEmFocoKey = String(estadoPainel.desafio_em_foco).trim();
  } else {
    desafioEmFocoKey = String(carregarDesafioEmFocoDaSessao() || '').trim();
  }

  currentUser = {
    id_dgmb: sessao.id_dgmb,
    nome: sessao.nome || '',
    cidade_uf: sessao.cidade_uf || ''

  syncAdminValidacaoVisibility();
  showScreen('painel');
  carregarPainel('restored');
  return true;
}

function tratarFalhaRestauracaoSessao() {
  limparSessaoLoginPersistida();
  limparEstadoPainelPersistido();
  currentUser = null;
  showScreen('login');
  setTransientStatus('login-msg', 'Sua sessão expirou. Entre novamente.', 'error');
}

function applyCpfMask(value) {
  const digits = onlyDigits(value).slice(0, 11);
  if (digits.length <= 3) return digits;
  if (digits.length <= 6) return digits.replace(/(\d{3})(\d+)/, '$1.$2');
  if (digits.length <= 9) return digits.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
  return digits.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
}

document.addEventListener('DOMContentLoaded', function() {
  const cpfInput = document.getElementById('cpf');
  const kmInput = document.getElementById('km-atividade');
  const params = new URLSearchParams(window.location.search);
  const cpfPrefill = onlyDigits(params.get('cpf') || '');

  if (cpfInput) {
    if (cpfPrefill.length === 11) {
      cpfInput.value = applyCpfMask(cpfPrefill);
    }

    cpfInput.addEventListener('input', function(e) {
      e.target.value = applyCpfMask(e.target.value);
    });
  }

  if (kmInput) {
    kmInput.addEventListener('input', function(e) {
      e.target.value = sanitizeKmInputValue(e.target.value);
    });
  }

  setupRegistroSubmitProtection();
  setupCancelEditTouchFeedback();
  setupRankingBackNavigationFeedback();
  setupPhraseButtonTouchFeedback();
  setupQuickKmShortcutFeedback();
  setupQuickKmClearFeedback();
  syncAdminValidacaoVisibility();
  tentarRestaurarSessaoPersistida();
});

function login() {
  const cpfInput = document.getElementById('cpf');
  const msg = document.getElementById('login-msg');
  const btn = document.getElementById('btn-login');

  if (!cpfInput || !msg || !btn) return;

  if (loginInProgress) {
    setTransientStatus('login-msg', 'Verificando acesso...', 'loading');
    return;
  }

  const cpf = readInputValue(cpfInput);

  loginInProgress = true;
  syncGlobalBusyState();
  setTransientStatus('login-msg', 'Verificando acesso...', 'loading');
  const finishLoadingBase = startLoadingState(btn, msg, 'Verificando acesso...');
  const finishLoading = function(nextMessage) {
    finishLoadingBase(nextMessage);
    loginInProgress = false;
    syncGlobalBusyState();
  };

  try {
    google.script.run
      .withSuccessHandler(function(res) {
        finishLoading();

        if (!res || !res.ok) {
          setTransientStatus('login-msg', (res && res.msg) ? res.msg : 'Não foi possível entrar.', 'error');
          return;
        }

        const userId = res.data && res.data.id_dgmb ? String(res.data.id_dgmb).trim() : '';
        if (!userId) {
          currentUser = null;
          setTransientStatus('login-msg', 'Sessão inválida. Entre novamente.', 'error');
          return;
        }

        currentUser = {
          id_dgmb: userId,
          nome: res.data && res.data.nome ? res.data.nome : '',
          cidade_uf: res.data && res.data.cidade_uf ? res.data.cidade_uf : ''
        };

        setTransientStatus('login-msg', '');

        persistirSessaoLogin(currentUser);
        syncAdminValidacaoVisibility();
        showScreen('painel');
        carregarPainel();
      })
      .withFailureHandler(function(err) {
        finishLoading();
        setTransientStatus('login-msg', 'Erro de conexão. Tente novamente.', 'error');
        console.error(err);
      })
      .loginCPF(cpf);
  } catch (err) {
    finishLoading();
    setTransientStatus('login-msg', 'Erro de conexão. Tente novamente.', 'error');
    console.error(err);
  }
}

function clearManualPainelSuccessFeedback() {

function syncPainelErrorState(message, variant) {
  const errorState = document.getElementById('painel-error-state');
  if (!errorState) return;

  const hasMessage = !!String(message || '').trim();
  const shouldShow = variant === 'error' && hasMessage;
  errorState.hidden = !shouldShow;
}

function setRankingLoadDisabled(disabled) {
  const topBtn = document.getElementById('btn-ranking-top');
  const painelBtn = document.getElementById('btn-ranking-painel');
  const desafioSelect = document.getElementById('ranking-desafio-select');

  if (topBtn) topBtn.disabled = !!disabled;
  if (painelBtn) painelBtn.disabled = !!disabled;
  if (desafioSelect) {
    if (disabled) {
      desafioSelect.setAttribute('data-prev-disabled', desafioSelect.disabled ? 'true' : 'false');
      desafioSelect.disabled = true;
    } else {
      const prevDisabled = desafioSelect.getAttribute('data-prev-disabled') === 'true';
      desafioSelect.disabled = prevDisabled;
      desafioSelect.removeAttribute('data-prev-disabled');
    }
  }
}

  var button = document.getElementById('btn-ranking-voltar');
  if (!button || button.dataset.feedbackReady === 'true') return;

  btn.dataset.touchFeedbackReady = 'true';

  btn.addEventListener('pointerdown', function(event) {

function clearPainelProgressFeedback() {
  painelProgressAnimationToken += 1;
  painelProgressFeedbackTimers.forEach(function(timerId) {
    clearTimeout(timerId);
  });
  painelProgressFeedbackTimers = [];

  [
    'realizado-km',
    'restante-km',
    'progress-percent',
    'progress-text'
  ].forEach(function(id) {
    var el = document.getElementById(id);

}

function animatePainelValue(id, fromValue, toValue, suffix, durationMs) {
  var el = document.getElementById(id);
  if (!el) return;
  var animationToken = painelProgressAnimationToken;

  var start = Number(fromValue);
  var end = Number(toValue);
  if (!Number.isFinite(start) || !Number.isFinite(end)) {
    el.innerText = formatNumber(end) + (suffix || '');
    return;
  }

  var delta = end - start;
  if (!delta) {
    el.innerText = formatNumber(end) + (suffix || '');
    return;
  }

  var maxDuration = Math.min(durationMs || 900, 1200);
  var startAt = null;

  function step(timestamp) {
    if (animationToken !== painelProgressAnimationToken) {
      return;
    }

    if (startAt === null) startAt = timestamp;
    var progress = Math.min((timestamp - startAt) / maxDuration, 1);
    var eased = 1 - Math.pow(1 - progress, 3);
    var value = start + (delta * eased);
    el.innerText = formatNumber(value) + (suffix || '');

    if (progress < 1) {
      window.requestAnimationFrame(step);
      return;
    }

    el.innerText = formatNumber(end) + (suffix || '');
  }

  window.requestAnimationFrame(step);
}

function playPainelProgressFeedback(previousPainel, nextPainel) {
  if (painelProgressFeedbackMode !== 'activity-registered') {
    return;
  }

  painelProgressFeedbackMode = '';

  if (!previousPainel || !nextPainel) {
    return;
  }

  var previousRealizado = toFiniteNumber(previousPainel.realizado, 0);
  var nextRealizado = toFiniteNumber(nextPainel.realizado, previousRealizado);
  var previousRestante = toFiniteNumber(previousPainel.restante, 0);
  var nextRestante = toFiniteNumber(nextPainel.restante, previousRestante);
  var previousPercentual = toFiniteNumber(previousPainel.percentual, 0);
  var nextPercentual = toFiniteNumber(nextPainel.percentual, previousPercentual);

  var realizouAvanco = nextRealizado > previousRealizado;
  var reduziuRestante = nextRestante < previousRestante;
  var percentualMudou = nextPercentual !== previousPercentual;

  if (!realizouAvanco && !reduziuRestante && !percentualMudou) {
    return;
  }

  clearPainelProgressFeedback();

  var realizadoEl = document.getElementById('realizado-km');
  var restanteEl = document.getElementById('restante-km');
  var percentEl = document.getElementById('progress-percent');
  var progressTextEl = document.getElementById('progress-text');

  if (realizouAvanco && realizadoEl) {
    realizadoEl.classList.add('painel-value-flash');
  }

  if (reduziuRestante && restanteEl) {
    restanteEl.classList.add('painel-value-flash');
  }

  if (percentualMudou && percentEl) {
    percentEl.classList.add('painel-value-pulse', 'painel-value-flash');
  }

  if ((realizouAvanco || reduziuRestante) && progressTextEl) {
    progressTextEl.classList.add('painel-value-flash');
  }

  var percentualDiff = Math.abs(nextPercentual - previousPercentual);
  var realizadoDiff = Math.abs(nextRealizado - previousRealizado);
  var restanteDiff = Math.abs(previousRestante - nextRestante);
  var shouldAnimateNumbers = percentualDiff <= 12 && realizadoDiff <= 60 && restanteDiff <= 60;

  if (shouldAnimateNumbers) {
    if (realizouAvanco) {
      animatePainelValue('realizado-km', previousRealizado, nextRealizado, '', 900);
    }

    if (reduziuRestante) {
      animatePainelValue('restante-km', previousRestante, nextRestante, '', 900);
    }

    if (percentualMudou) {
      animatePainelValue('progress-percent', previousPercentual, nextPercentual, '%', 1050);
    }
  }

  painelProgressFeedbackTimers.push(window.setTimeout(function() {
    clearPainelProgressFeedback();
    setTextById('realizado-km', formatNumber(nextRealizado));
    setTextById('restante-km', formatNumber(nextRestante));
    setTextById('progress-percent', formatNumber(nextPercentual) + '%');
    setTextById(
      'progress-text',
      formatNumber(nextRealizado) + ' km de ' + formatNumber(toFiniteNumber(nextPainel.meta, 0)) + ' km'
    );
  }, 1600));
}

function playTotalPedaladoFeedback(previousPainel, nextPainel) {

    && previousPainel.posicao_ranking !== undefined

    && nextPainel.total_participantes !== undefined

      ? nextPainel.total_participantes
      : nextPainel.totalParticipantes;
  var previousPosition = Number(previousPositionSource);
  var nextPosition = Number(nextPositionSource);
  var previousParticipants = Number(previousParticipantsSource);
  var nextParticipants = Number(nextParticipantsSource);
  var hasPreviousPosition = Number.isFinite(previousPosition) && previousPosition > 0;
  var hasNextPosition = Number.isFinite(nextPosition) && nextPosition > 0;
  var rankingBecameAvailable = !hasPreviousPosition && hasNextPosition;
  var positionChanged = hasPreviousPosition && hasNextPosition && previousPosition !== nextPosition;
  var participantsChanged = Number.isFinite(previousParticipants) && Number.isFinite(nextParticipants) && previousParticipants !== nextParticipants;
  var synchronized = hasNextPosition || Number.isFinite(nextParticipants);

  if (!positionChanged && !participantsChanged && !synchronized) {
    return;
  }

  clearRankingPreviewFeedback();
  clearRankingButtonFeedback();
  lastRankingTriggerButton = null;
  void rankingBox.offsetWidth;

    rankingDetail.classList.add('ranking-preview-shift-text');

function carregarPainel(triggerSource) {
  if (!currentUser || !currentUser.id_dgmb) {
    setTransientStatus('login-msg', 'Sua sessão expirou. Entre novamente.', 'error');
    showScreen('login');
    return;
  }

  if (painelLoadInProgress) {
    painelReloadPending = true;
    setPainelMsg(triggerSource === 'manual'
      ? 'Atualização em andamento...'
      : 'Atualizando painel...',
      'loading');
    return;
  }

  if (activityMutationInProgress) {
    painelReloadPending = true;
    setPainelMsg('Aguarde a operação atual terminar para atualizar o painel.', 'loading');
    return;
  }

  painelLoadInProgress = true;
  syncGlobalBusyState();
  painelReloadPending = false;
  painelLoadRequestId += 1;
  const requestId = painelLoadRequestId;

  setManualPainelRefreshDisabled(true);
  if (!currentPainel) {
    resetPainelVisualState();
  }
  setPainelMsg(triggerSource === 'manual' ? 'Atualizando painel...' : 'Carregando painel...', 'loading');

  google.script.run
    .withSuccessHandler(function(res) {
      if (requestId !== painelLoadRequestId) {
        return;
      }

      painelLoadInProgress = false;
      syncGlobalBusyState();
      setManualPainelRefreshDisabled(false);

      if (!res || !res.ok) {
        if (triggerSource === 'restored') {
          painelReloadPending = false;
          tratarFalhaRestauracaoSessao();
          return;
        }

        setPainelMsg((res && res.msg) ? res.msg : 'Erro ao carregar painel. Tente novamente.', 'error');
        painelReloadPending = false;
        return;
      }

      setPainelMsg(
        triggerSource === 'manual' ? 'Painel atualizado com sucesso.' : 'Painel pronto.',
        'success',
        triggerSource === 'manual' ? 2200 : 1600
      );
      if (triggerSource === 'manual') {
        playManualPainelSuccessFeedback();
      }
      var previousPainel = currentPainel;
      var shouldPlayRankingPreviewFeedback = painelProgressFeedbackMode === 'activity-registered';
      var shouldPlayRitmoAgoraFeedback = painelProgressFeedbackMode === 'activity-registered';
      currentPainel = res.data || {};
      if (currentPainel && currentUser) {
        currentUser.nome = String(currentPainel.nome || currentUser.nome || '').trim();
        currentUser.cidade_uf = String(currentPainel.cidade_uf || currentUser.cidade_uf || '').trim();
        persistirSessaoLogin(currentUser);
      }
      renderPainel(currentPainel);
      playTotalPedaladoFeedback(previousPainel, currentPainel);
      playPainelProgressFeedback(previousPainel, currentPainel);
      if (shouldPlayRankingPreviewFeedback) {
        playRankingPreviewFeedback(previousPainel, currentPainel);
      }
      if (shouldPlayRitmoAgoraFeedback) {
        playRitmoAgoraFeedback();
      }

      if (painelReloadPending) {
        carregarPainel();
      } else if (triggerSource === 'restored' && telaPrivadaRestaurada === 'ranking') {
        carregarRanking('restored');
      }
    })
    .withFailureHandler(function(err) {
      if (requestId !== painelLoadRequestId) {
        return;
      }

      painelLoadInProgress = false;
      syncGlobalBusyState();
      setManualPainelRefreshDisabled(false);

      if (triggerSource === 'restored') {
        painelReloadPending = false;
        console.error(err);
        tratarFalhaRestauracaoSessao();
        return;
      }

      setPainelMsg('Erro de conexão ao atualizar painel.', 'error');
      console.error(err);
      painelReloadPending = false;
    })
    .getPainelUsuario(currentUser.id_dgmb);
}

function renderPainel(p) {
  setTextById('painel-nome', p.nome || '');
  setTextById('painel-cidade', p.cidade_uf || '');

  var idHidden = document.getElementById('painel-id-dgmb');
  if (idHidden) {
    idHidden.value = String(p.id_dgmb || (currentUser && currentUser.id_dgmb) || '').trim();
  }

  setTextById('frase-box', p.frase || 'Cada quilômetro conta. Continue no seu ritmo.');
  renderDesafiosPainel(p || {});
  sincronizarPainelComDesafioEmFoco();
  setTextById('total-pedalado', formatNumber(p.totalPedalado || p.realizado || 0));
}

function getDesafioKey(desafio) {
  if (!desafio) return '';
  var idDesafio = String(desafio.id_desafio || '').trim();
  var idItem = String(desafio.id_item_estoque || '').trim();
  var inicio = String(desafio.periodo_inicio || '').trim();
  var fim = String(desafio.periodo_fim || '').trim();
  if (!idDesafio) return '';
  if (idItem) return idDesafio + '|' + idItem;
  if (inicio || fim) return [idDesafio, inicio, fim].join('|');
  return idDesafio;
}

function salvarDesafioEmFocoNaSessao(chave) {
  var valor = String(chave || '').trim();
  try {
    if (!valor) {
      sessionStorage.removeItem(DESAFIO_CARROSSEL_SESSION_KEY);
      localStorage.removeItem(DESAFIO_CARROSSEL_SESSION_KEY);
      persistirEstadoPainel({ desafio_em_foco: '' });
      return;
    }
    sessionStorage.setItem(DESAFIO_CARROSSEL_SESSION_KEY, valor);
    localStorage.setItem(DESAFIO_CARROSSEL_SESSION_KEY, valor);
    persistirEstadoPainel({ desafio_em_foco: valor });
  } catch (err) {
    console.warn('Não foi possível salvar o desafio em foco na sessão.', err);
  }
}

function carregarDesafioEmFocoDaSessao() {
  try {
    var valorSessao = String(sessionStorage.getItem(DESAFIO_CARROSSEL_SESSION_KEY) || '').trim();
    if (valorSessao) return valorSessao;

    return String(localStorage.getItem(DESAFIO_CARROSSEL_SESSION_KEY) || '').trim();
  } catch (err) {
    console.warn('Não foi possível recuperar o desafio em foco da sessão.', err);
    return '';
  }
}

function escolherIndiceDesafioMaisRelevante(itens) {
  var lista = Array.isArray(itens) ? itens : [];
  if (!lista.length) return -1;

  var melhorIndice = 0;
  for (var i = 1; i < lista.length; i++) {
    if (compararRelevanciaDesafio(lista[i], lista[melhorIndice]) < 0) {
      melhorIndice = i;
    }
  }
  return melhorIndice;
}

function compararRelevanciaDesafio(a, b) {
  var percentualA = toFiniteNumber(a && a.percentual_concluido, 0);
  var percentualB = toFiniteNumber(b && b.percentual_concluido, 0);
  if (percentualA !== percentualB) {
    return percentualB - percentualA;
  }

  var distanciaA = toFiniteNumber(a && a.distancia_realizada, 0);
  var distanciaB = toFiniteNumber(b && b.distancia_realizada, 0);
  if (distanciaA !== distanciaB) {
    return distanciaB - distanciaA;
  }

  return 0;
}

function parseIsoDateLocal(value) {
  var s = String(value || '').trim();
  var match = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!match) return null;
  return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
}

function calcularRitmoDesafio(meta, realizado, periodoInicio, periodoFim) {
  var now = new Date();
  var inicio = parseIsoDateLocal(periodoInicio) || new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var fim = parseIsoDateLocal(periodoFim) || inicio;

  if (fim.getTime() < inicio.getTime()) {
    var swap = inicio;
    inicio = fim;
    fim = swap;
  }

  var msDia = 24 * 60 * 60 * 1000;
  var diasTotal = Math.max(Math.floor((fim.getTime() - inicio.getTime()) / msDia) + 1, 1);
  var diaAtual = Math.floor((now.getTime() - inicio.getTime()) / msDia) + 1;

  if (diaAtual < 1) diaAtual = 1;
  if (diaAtual > diasTotal) diaAtual = diasTotal;

  var diasRestantes = Math.max(diasTotal - diaAtual, 0);
  var kmIdealPorDia = meta > 0 ? meta / diasTotal : 0;
  var kmIdealHoje = kmIdealPorDia * diaAtual;
  var restante = Math.max(meta - realizado, 0);
  var kmPorDiaRestante = diasRestantes > 0 ? restante / diasRestantes : restante;

  var diferenca = realizado - kmIdealHoje;
  var tolerancia = Math.max(2, meta * 0.01);
  var status = 'Você está à frente da meta.';
  var mensagem = 'Seu progresso está acima do ritmo esperado para este momento do desafio.';

  if (diferenca < -tolerancia) {
    status = 'Você está um pouco abaixo do ritmo.';
    mensagem = 'Alguns pedais extras podem ajudar a recuperar o ritmo do desafio.';
  }

  return {
    diaAtual: diaAtual,
    diasRestantes: diasRestantes,
    kmIdealAtual: kmIdealHoje,
    kmPorDiaRestante: kmPorDiaRestante,
    ritmo_status: status,
    ritmo_mensagem: mensagem
  };
}

function calcularProgressoDesafio(meta, realizado) {
  var restante = Math.max(meta - realizado, 0);
  var percentual = meta > 0 ? (realizado / meta) * 100 : 0;

  return {
    restante: restante,
    percentual: Math.max(0, Math.min(100, percentual))
  };
}

function filtrarAtividadesPorPeriodoDesafio(atividades, desafio) {
  var lista = Array.isArray(atividades) ? atividades : [];
  var inicio = String(desafio && desafio.periodo_inicio || '').trim();
  var fim = String(desafio && desafio.periodo_fim || '').trim();

  if (!inicio || !fim) return lista;

  return lista.filter(function(item) {
    var data = String(item && item.data || '').trim();
    return !!data && data >= inicio && data <= fim;
  });
}

function montarPainelContextual(basePainel, desafio) {
  var painel = basePainel || {};
  var desafioAtual = desafio || null;
  var meta = toFiniteNumber(desafioAtual && desafioAtual.meta_km, toFiniteNumber(painel.meta, 0));
  var realizado = toFiniteNumber(desafioAtual && desafioAtual.distancia_realizada, toFiniteNumber(painel.realizado, 0));
  var progresso = calcularProgressoDesafio(meta, realizado);
  var ritmo = calcularRitmoDesafio(
    meta,
    realizado,
    desafioAtual && desafioAtual.periodo_inicio ? desafioAtual.periodo_inicio : painel.periodo_inicio,
    desafioAtual && desafioAtual.periodo_fim ? desafioAtual.periodo_fim : painel.periodo_fim
  );

  var rankingPorDesafio = painel.ranking_por_desafio || {};
  var rankingDesafio = rankingPorDesafio[getDesafioKey(desafioAtual)] || {};
  var posicaoRanking = rankingDesafio.posicao !== undefined ? rankingDesafio.posicao : painel.posicao_ranking;
  var totalParticipantes = rankingDesafio.total !== undefined ? rankingDesafio.total : painel.total_participantes;

  return {
    meta: meta,
    realizado: realizado,
    restante: progresso.restante,
    percentual: progresso.percentual,
    diaAtual: ritmo.diaAtual,
    diasRestantes: ritmo.diasRestantes,
    kmIdealAtual: ritmo.kmIdealAtual,
    kmPorDiaRestante: ritmo.kmPorDiaRestante,
    ritmo_status: ritmo.ritmo_status,
    ritmo_mensagem: ritmo.ritmo_mensagem,
    posicao_ranking: posicaoRanking,
    total_participantes: totalParticipantes,
    atividades: filtrarAtividadesPorPeriodoDesafio(painel.atividades || [], desafioAtual)
  };
}

function atualizarContextoVisualRanking(desafioAtual) {
  var nomeDesafio = getDesafioTitulo(desafioAtual || {});
  var titulo = document.getElementById('painel-ranking-context-title');
  var subtitulo = document.getElementById('painel-ranking-context-subtitle');

      ? 'Ranking do desafio em foco'

  }

  if (subtitulo) {
    subtitulo.innerText = desafioAtual

      : 'Selecione um desafio ativo no carrossel para ver o ranking correspondente.';
  }

  if (dica) {
    dica.innerText = 'Troque o desafio no carrossel para ver outro ranking.';
  }
}

function sincronizarPainelComDesafioEmFoco() {
  var painel = currentPainel || {};
  var desafioAtual = null;

  if (Array.isArray(desafiosAtivosCarouselItems) && desafiosAtivosCarouselItems.length) {
    desafioAtual = desafiosAtivosCarouselItems[desafiosAtivosCarouselIndex] || null;
    desafioEmFocoKey = getDesafioKey(desafioAtual);
  }

  var contexto = montarPainelContextual(painel, desafioAtual);
  atualizarContextoVisualRanking(desafioAtual);

  setTextById('meta-km', formatNumber(contexto.meta));
  setTextById('realizado-km', formatNumber(contexto.realizado));
  setTextById('restante-km', formatNumber(contexto.restante));
  setTextById('progress-text', formatNumber(contexto.realizado) + ' km de ' + formatNumber(contexto.meta) + ' km');
  setTextById('progress-percent', formatNumber(contexto.percentual) + '%');

  const bar = document.getElementById('progress-bar');
  if (bar) {
    bar.style.width = Math.max(0, Math.min(100, toFiniteNumber(contexto.percentual, 0))) + '%';
  }

  setTextById('ritmo-dia', 'Dia ' + formatNumber(contexto.diaAtual) + ' do desafio.');
  setTextById('ritmo-ideal', formatNumber(contexto.kmIdealAtual) + ' km');
  setTextById('ritmo-atual', 'Você tem ' + formatNumber(contexto.realizado) + ' km.');
  setTextById('ritmo-restante', formatNumber(contexto.diasRestantes) + ' dias');
  setTextById('ritmo-meta', formatNumber(contexto.kmPorDiaRestante) + ' km/dia');
  renderRitmoAgora(contexto);

  const posicaoRanking = Number(contexto.posicao_ranking);
  const totalParticipantes = Number(contexto.total_participantes);
  const hasPosicaoRanking = Number.isFinite(posicaoRanking) && posicaoRanking > 0;
  const posicaoRankingEl = document.getElementById('painel-posicao-ranking');
  const posicaoDetalheEl = document.getElementById('painel-posicao-detalhe');

  if (posicaoRankingEl) {
    posicaoRankingEl.innerText = hasPosicaoRanking
      ? 'Sua posição no ranking: ' + formatNumber(posicaoRanking)
      : 'Ranking ainda indisponível.';
  }

  if (posicaoDetalheEl) {
    posicaoDetalheEl.innerText = Number.isFinite(Number(totalParticipantes))
      ? 'Base atual: ' + formatNumber(totalParticipantes) + ' participantes.'
      : 'Disponível quando houver base de comparação.';
  }

  renderAtividades(contexto.atividades || []);
}

function setTextById(id, text) {
  const el = document.getElementById(id);
  if (el) {
    el.innerText = text;
  }
}

function renderDesafiosPainel(painel) {
  var desafiosAtivos = normalizarListaDesafiosPainel_(painel.desafios_ativos).filter(function(item) {
    return isDesafioAtivo_(item);
  });
  var desafiosHistorico = normalizarListaDesafiosPainel_(painel.desafios_historico).filter(function(item) {
    return isDesafioHistoricoElegivel_(item);
  });
  var desafiosFallback = normalizarListaDesafiosPainel_(painel.desafios);

  if (desafiosFallback.length) {
    if (!desafiosAtivos.length && !desafiosHistorico.length) {
      desafiosAtivos = desafiosFallback.filter(function(item) { return isDesafioAtivo_(item); });
      desafiosHistorico = desafiosFallback.filter(function(item) { return isDesafioHistoricoElegivel_(item); });
    } else {
      var chavesAtivos = mapearChavesDesafiosBase_(desafiosAtivos);
      var chavesHistorico = mapearChavesDesafiosBase_(desafiosHistorico);
      desafiosFallback.forEach(function(item) {
        var chave = getDesafioBaseKey_(item);
        if (!chave) return;
        if (chavesAtivos[chave] || chavesHistorico[chave]) return;
        if (isDesafioAtivo_(item)) {
          desafiosAtivos.push(item);
          chavesAtivos[chave] = true;
        } else if (isDesafioHistoricoElegivel_(item)) {
          desafiosHistorico.push(item);
          chavesHistorico[chave] = true;
        }
      });
    }
  }

  if (desafiosAtivos.length && desafiosHistorico.length) {
    var ativosMap = mapearChavesDesafiosBase_(desafiosAtivos);
    desafiosHistorico = desafiosHistorico.filter(function(item) {
      return !ativosMap[getDesafioBaseKey_(item)];
    });
  }

  desafiosHistorico.sort(compareDesafioHistorico_);

  renderDesafiosAtivosCarrossel('desafios-ativos-lista', desafiosAtivos, {
    emptyTitle: 'Nenhum desafio ativo no momento.',
    emptyDescription: 'Assim que houver desafios ativos, eles aparecerão aqui.'
  });

  renderDesafiosLista('desafios-historico-lista', desafiosHistorico, {
    emptyTitle: 'Sem histórico consolidado no momento.',
    emptyDescription: 'Quando seus desafios forem concluídos ou encerrados, eles aparecem aqui.',
    isHistorico: true
  });
}

function renderDesafiosAtivosCarrossel(containerId, lista, options) {
  var box = document.getElementById(containerId);
  if (!box) return;

  options = options || {};
  box.innerHTML = '';

  var itens = Array.isArray(lista) ? lista.slice() : [];
  var indexFromFocus = -1;
  var desafioMemorizado = String(desafioEmFocoKey || carregarDesafioEmFocoDaSessao() || '').trim();

  if (desafioMemorizado) {
    for (var i = 0; i < itens.length; i++) {
      if (getDesafioKey(itens[i]) === desafioMemorizado) {
        indexFromFocus = i;
        break;
      }
    }
  }

  desafiosAtivosCarouselItems = itens;
  if (indexFromFocus >= 0) {
    desafiosAtivosCarouselIndex = indexFromFocus;
  } else if (desafioMemorizado) {
    var indiceMemoriaNaoEncontrada = escolherIndiceDesafioMaisRelevante(itens);
    desafiosAtivosCarouselIndex = indiceMemoriaNaoEncontrada >= 0
      ? indiceMemoriaNaoEncontrada
      : Math.max(0, Math.min(Number(desafiosAtivosCarouselIndex) || 0, Math.max(0, itens.length - 1)));
  } else {
    var indiceAtual = Number(desafiosAtivosCarouselIndex);
    if (Number.isInteger(indiceAtual) && indiceAtual >= 0 && indiceAtual < itens.length) {
      desafiosAtivosCarouselIndex = indiceAtual;
    } else {
      var indiceMaisRelevante = escolherIndiceDesafioMaisRelevante(itens);
      desafiosAtivosCarouselIndex = indiceMaisRelevante >= 0
        ? indiceMaisRelevante
        : Math.max(0, Math.min(indiceAtual, Math.max(0, itens.length - 1)));
    }
  }

  if (!itens.length) {
    desafioEmFocoKey = '';
    salvarDesafioEmFocoNaSessao('');
    var titulo = options.emptyTitle || 'Nenhum desafio para exibir.';
    var descricao = options.emptyDescription || 'Novos desafios serão exibidos aqui assim que estiverem disponíveis.';
    box.innerHTML =
      '<div class="atividade atividade-empty desafio-empty">' +
        '<strong>' + escapeHtml(titulo) + '</strong>' +
        '<p>' + escapeHtml(descricao) + '</p>' +
      '</div>';
    atualizarSeletorDesafioRanking();
    return;
  }

  desafioEmFocoKey = getDesafioKey(itens[desafiosAtivosCarouselIndex]);
  salvarDesafioEmFocoNaSessao(desafioEmFocoKey);
  box.appendChild(buildDesafioCard(itens[desafiosAtivosCarouselIndex], { isHistorico: false }));

  if (itens.length > 1) {
    var controls = document.createElement('div');
    controls.className = 'desafios-carousel-controls';
    controls.innerHTML =
      '<button type="button" class="desafios-carousel-btn" onclick="navegarDesafioAtivo(-1)" ' + (desafiosAtivosCarouselIndex <= 0 ? 'disabled' : '') + ' aria-label="Desafio anterior">←</button>' +
      '<span class="desafios-carousel-indicador">' + (desafiosAtivosCarouselIndex + 1) + ' de ' + itens.length + '</span>' +
      '<button type="button" class="desafios-carousel-btn" onclick="navegarDesafioAtivo(1)" ' + (desafiosAtivosCarouselIndex >= (itens.length - 1) ? 'disabled' : '') + ' aria-label="Próximo desafio">→</button>';
    box.appendChild(controls);
  }

  atualizarSeletorDesafioRanking();
}

function navegarDesafioAtivo(delta) {
  var total = Array.isArray(desafiosAtivosCarouselItems) ? desafiosAtivosCarouselItems.length : 0;
  if (total <= 1) return;

  var proximoIndice = desafiosAtivosCarouselIndex + Number(delta || 0);
  desafiosAtivosCarouselIndex = Math.max(0, Math.min(total - 1, proximoIndice));
  desafioEmFocoKey = getDesafioKey(desafiosAtivosCarouselItems[desafiosAtivosCarouselIndex]);
  salvarDesafioEmFocoNaSessao(desafioEmFocoKey);
  renderDesafiosAtivosCarrossel('desafios-ativos-lista', desafiosAtivosCarouselItems, {});
  sincronizarPainelComDesafioEmFoco();
}

function atualizarSeletorDesafioRanking() {
  var select = document.getElementById('ranking-desafio-select');
  if (!select) return;

  var itens = Array.isArray(desafiosAtivosCarouselItems) ? desafiosAtivosCarouselItems : [];
  select.innerHTML = '';

  if (!itens.length) {
    var emptyOption = document.createElement('option');
    emptyOption.value = '';
    emptyOption.innerText = 'Sem desafios ativos';
    select.appendChild(emptyOption);
    select.disabled = true;
    return;
  }

  select.disabled = itens.length <= 1;

  itens.forEach(function(item, index) {
    var option = document.createElement('option');
    option.value = String(index);
    option.innerText = getDesafioTitulo(item || {});
    select.appendChild(option);
  });

  var indiceSeguro = Math.max(0, Math.min(itens.length - 1, Number(desafiosAtivosCarouselIndex) || 0));
  if (indiceSeguro !== desafiosAtivosCarouselIndex) {
    desafiosAtivosCarouselIndex = indiceSeguro;
    desafioEmFocoKey = getDesafioKey(itens[indiceSeguro]);
    salvarDesafioEmFocoNaSessao(desafioEmFocoKey);
  }

  select.value = String(indiceSeguro);
}

function onRankingDesafioSelectorChange(value) {
  var total = Array.isArray(desafiosAtivosCarouselItems) ? desafiosAtivosCarouselItems.length : 0;
  if (!total) {
    atualizarSeletorDesafioRanking();
    return;
  }

  var indiceSelecionado = Number(value);
  if (!Number.isInteger(indiceSelecionado)) {
    atualizarSeletorDesafioRanking();
    return;
  }

  if (indiceSelecionado < 0 || indiceSelecionado >= total) {
    atualizarSeletorDesafioRanking();
    return;
  }

  var novoIndice = indiceSelecionado;
  if (novoIndice === desafiosAtivosCarouselIndex) return;

  desafiosAtivosCarouselIndex = novoIndice;
  desafioEmFocoKey = getDesafioKey(desafiosAtivosCarouselItems[desafiosAtivosCarouselIndex]);
  salvarDesafioEmFocoNaSessao(desafioEmFocoKey);

  renderDesafiosAtivosCarrossel('desafios-ativos-lista', desafiosAtivosCarouselItems, {});
  sincronizarPainelComDesafioEmFoco();
  carregarRanking('manual');
}

function renderDesafiosLista(containerId, lista, options) {
  var box = document.getElementById(containerId);
  if (!box) return;

  options = options || {};
  box.innerHTML = '';

  var itens = Array.isArray(lista) ? lista.slice() : [];
  if (options.principalRef) {
    itens = itens.filter(function(item) {
      return !isMesmoDesafio(item, options.principalRef);
    });
  }

  if (!itens.length) {
    var titulo = options.emptyTitle || 'Nenhum desafio para exibir.';
    var descricao = options.emptyDescription || 'Novos desafios serão exibidos aqui assim que estiverem disponíveis.';
    box.innerHTML =
      '<div class="atividade atividade-empty desafio-empty">' +
        '<strong>' + escapeHtml(titulo) + '</strong>' +
        '<p>' + escapeHtml(descricao) + '</p>' +
      '</div>';
    return;
  }

  itens.forEach(function(item) {
    box.appendChild(buildDesafioCard(item, options));
  });
}

function buildDesafioCard(item, options) {
  var desafio = item || {};
  var card = document.createElement('div');
  options = options || {};

  var statusLabel = String(desafio.status_apuracao || '-').trim() || '-';
  var statusClass = getDesafioStatusClass(statusLabel);
  var percentualNumero = toFiniteNumber(desafio.percentual_concluido, 0);
  var percentualNormalizado = Math.max(0, Math.min(100, percentualNumero));

  card.className = 'atividade desafio-resumo-card ' + statusClass + (options.isHistorico ? ' desafio-resumo-card-historico' : '');

  var nome = getDesafioTitulo(desafio);
  var meta = formatNumber(desafio.meta_km);
  var realizado = formatNumber(desafio.distancia_realizada);
  var percentual = formatNumber(percentualNormalizado);
  var restante = formatNumber(Math.max(0, toFiniteNumber(desafio.meta_km, 0) - toFiniteNumber(desafio.distancia_realizada, 0)));
  var statusDesafioCertificado = String((desafio && desafio.status_apuracao) || '').trim().toUpperCase();
  var statusValidacaoCertificado = String((desafio && desafio.status_validacao_certificado) || '').trim().toUpperCase();
  var concluido = statusDesafioCertificado === 'CONCLUIDO';
  var aguardandoValidacaoCertificado = concluido && statusValidacaoCertificado !== 'APROVADO';
  var podeBaixarCertificado = isDesafioElegivelCertificado_(desafio);
  var payloadCertificado = encodeURIComponent(JSON.stringify({
    id_desafio: desafio.id_desafio || '',

function getDesafioStatusClass(status) {
  var normalizado = String(status || '').trim().toUpperCase();
  if (normalizado === 'ATIVO') return 'desafio-status-ativo';
  if (normalizado === 'CONCLUIDO') return 'desafio-status-concluido';
  if (normalizado === 'EXPIRADO') return 'desafio-status-expirado';
  if (normalizado === 'INAPTO') return 'desafio-status-inapto';
  return 'desafio-status-neutro';
}

function normalizarListaDesafiosPainel_(lista) {
  if (!Array.isArray(lista) || !lista.length) return [];
  var out = [];
  var vistos = {};
  for (var i = 0; i < lista.length; i++) {
    var item = lista[i];
    var chave = getDesafioBaseKey_(item);
    if (!chave || vistos[chave]) continue;
    vistos[chave] = true;
    out.push(item);
  }
  return out;
}

function getDesafioBaseKey_(desafio) {
  if (!desafio) return '';
  var idDesafio = String(desafio.id_desafio || '').trim();
  var idItem = String(desafio.id_item_estoque || '').trim();
  var inicio = String(desafio.periodo_inicio || '').trim();
  var fim = String(desafio.periodo_fim || '').trim();
  if (!idDesafio && !idItem) return '';
  return [idDesafio, idItem, inicio, fim].join('|');
}

function mapearChavesDesafiosBase_(lista) {
  var map = {};
  var itens = Array.isArray(lista) ? lista : [];
  for (var i = 0; i < itens.length; i++) {
    var chave = getDesafioBaseKey_(itens[i]);
    if (chave) map[chave] = true;
  }
  return map;
}

function isDesafioAtivo_(desafio) {
  return String((desafio && desafio.status_apuracao) || '').trim().toUpperCase() === 'ATIVO';
}

function isDesafioHistoricoElegivel_(desafio) {
  var status = String((desafio && desafio.status_apuracao) || '').trim().toUpperCase();
  var statusHistorico = {
    CONCLUIDO: true,
    EXPIRADO: true,
    CANCELADO: true,
    DESISTENTE: true,
    ENCERRADO: true
  };
  return !!statusHistorico[status];
}

function isDesafioElegivelCertificado_(desafio) {
  if (!desafio) return false;
  var status = String((desafio && desafio.status_apuracao) || '').trim().toUpperCase();
  var statusConclusao = {
    CONCLUIDO: true,
    FINALIZADO: true,
    ENCERRADO: true
  };
  var statusValidacao = String((desafio && desafio.status_validacao_certificado) || '').trim().toUpperCase();
  return !!statusConclusao[status] && statusValidacao === 'APROVADO';
}

function solicitarCertificadoDesafio(payloadEncoded, localStatusId, buttonId) {
  var payload = {};
  try {
    payload = JSON.parse(decodeURIComponent(String(payloadEncoded || '')));
  } catch (e) {
    payload = {};
  }

  var idDgmb = currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '';
  var btn = document.getElementById(String(buttonId || ''));
  if (!idDgmb) {
    setPainelMsg('Sessão inválida. Entre novamente para baixar seu certificado.', 'error');
    setCertificadoLocalMsg(localStatusId, 'Sessão inválida. Entre novamente para baixar seu certificado.', 'error');
    return;
  }

  if (btn) {
    btn.disabled = true;
  }

  setPainelMsg('Gerando certificado...', 'loading');
  setCertificadoLocalMsg(localStatusId, 'Gerando seu certificado...', 'loading');
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) {
        btn.disabled = false;
      }

      if (!res || res.ok !== true || !res.url) {
        if (res && res.code === 'CERTIFICADO_NAO_LIBERADO') {
          setPainelMsg('Aguardando validação do seu desempenho pela equipe.', 'loading');
          setCertificadoLocalMsg(localStatusId, 'Aguardando validação do seu desempenho pela equipe.', 'loading');
          return;
        }
        var mensagemErro = (res && res.msg) ? res.msg : 'Não foi possível gerar o certificado agora.';
        setPainelMsg(mensagemErro, 'error');
        setCertificadoLocalMsg(localStatusId, mensagemErro, 'error');
        return;
      }
      setPainelMsg(res.reused ? 'Certificado pronto para download.' : 'Certificado gerado com sucesso.', 'success', 2600);
      setCertificadoLocalMsg(localStatusId, 'Certificado pronto. Abrindo...', 'success', 3000);
      window.open(res.url, '_blank', 'noopener');
    })
    .withFailureHandler(function() {
      if (btn) {
        btn.disabled = false;
      }
      setPainelMsg('Erro de conexão ao gerar certificado.', 'error');
      setCertificadoLocalMsg(localStatusId, 'Não foi possível gerar seu certificado agora. Tente novamente.', 'error');
    })
    .gerarOuObterCertificadoDesafio({
      id_dgmb: idDgmb,
      id_desafio: payload.id_desafio || '',
      id_item_estoque: payload.id_item_estoque || ''
    });
}

function compareDesafioHistorico_(a, b) {
  var fimA = String((a && a.periodo_fim) || '').trim();
  var fimB = String((b && b.periodo_fim) || '').trim();
  if (fimA !== fimB) return fimB.localeCompare(fimA);

  var inicioA = String((a && a.periodo_inicio) || '').trim();
  var inicioB = String((b && b.periodo_inicio) || '').trim();
  if (inicioA !== inicioB) return inicioB.localeCompare(inicioA);

  var nomeA = String((a && (a.nome_desafio || a.nome || a.titulo)) || '').trim();
  var nomeB = String((b && (b.nome_desafio || b.nome || b.titulo)) || '').trim();
  return nomeA.localeCompare(nomeB);
}

function isMesmoDesafio(a, b) {
  if (!a || !b) return false;
  var chaveA = [String(a.id_desafio || '').trim(), String(a.id_item_estoque || '').trim()].join('|');
  var chaveB = [String(b.id_desafio || '').trim(), String(b.id_item_estoque || '').trim()].join('|');
  return chaveA && chaveA === chaveB;
}

function getDesafioTitulo(desafio) {
  var nome = String(
    (desafio && (
      desafio.nome_desafio ||
      desafio.nome ||
      desafio.titulo ||
      desafio.desafio_nome ||
      desafio.identificacao
    )) || ''
  ).trim();

  if (nome) return nome;

  var idDesafio = String((desafio && desafio.id_desafio) || '').trim();
  var idItem = String((desafio && desafio.id_item_estoque) || '').trim();

  if (idItem && idDesafio) return 'Desafio ' + idDesafio + ' · Item ' + idItem;
  if (idItem) return 'Item ' + idItem;
  if (idDesafio) return 'Desafio ' + idDesafio;
  return 'Desafio sem identificação';
}

function getGoogleScriptErrorMessage(err, fallback) {
  const fallbackText = String(fallback || 'Erro inesperado.').trim() || 'Erro inesperado.';

  if (typeof err === 'string') {
    const text = err.trim();
    if (text) return 'string: ' + text;
    return fallbackText;
  }

  if (err && typeof err === 'object') {
    const parts = [];

    parts.push('type=' + typeof err);

    const fields = ['name', 'message', 'msg', 'details', 'error', 'stack'];
    for (var i = 0; i < fields.length; i++) {
      const key = fields[i];
      const value = err[key];
      if (value === undefined || value === null) continue;
      const text = String(value).trim();
      if (!text || text === '[object Object]' || text.toLowerCase() === 'undefined') continue;
      parts.push(key + '=' + text);
    }

    try {
      const keys = Object.keys(err);
      if (keys && keys.length) {
        parts.push('keys=' + keys.join(','));
      }
    } catch (keysErr) {}

    try {
      const serialized = JSON.stringify(err);
      if (serialized && serialized !== '{}' && serialized !== '[]') {
        parts.push('json=' + serialized);
      }
    } catch (jsonErr) {}

    if (parts.length) {
      return parts.join(' | ');
    }
  }

  return fallbackText;
}

function toFiniteNumber(value, fallback) {
  const n = Number(value);
  return Number.isFinite(n) ? n : Number(fallback || 0);
}

function isValidActivityDate(value) {
  const parsed = parseIsoDateLocal(value);
  if (!parsed) return false;

  const match = String(value || '').trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!match) return false;

  return parsed.getFullYear() === Number(match[1])
    && (parsed.getMonth() + 1) === Number(match[2])
    && parsed.getDate() === Number(match[3]);
}

function parseValidActivityKm(value) {
  const raw = String(value || '').trim();
  const sanitized = sanitizeKmInputValue(raw);
  if (!sanitized || sanitized !== raw) return null;
  if (!/^\d+(?:[.,]\d+)?$/.test(sanitized)) return null;

  const numeric = Number(sanitized.replace(',', '.'));
  if (!Number.isFinite(numeric) || numeric <= 0) return null;
  return numeric;
}

async function salvarAtividade(forcarDuplicidade) {
  const idHidden = document.getElementById('painel-id-dgmb');
  const idDgmb = idHidden && idHidden.value
    ? String(idHidden.value).trim()
    : (currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '');

  const dataInput = document.getElementById('data-atividade');
  const kmInput = document.getElementById('km-atividade');
  const msg = document.getElementById('registro-msg');
  const btn = document.getElementById('btn-salvar');

  if (!dataInput || !kmInput || !msg || !btn) {
    releaseRegistroSubmitGuard();
    return;
  }

  const data = readInputValue(dataInput);
  const km = readInputValue(kmInput);

  setRegistroMsg('');

  if (!idDgmb) {
    releaseRegistroSubmitGuard();
    setRegistroMsg('Sessão inválida. Entre novamente.', 'error');
    return;
  }

  if (activityMutationInProgress || btn.disabled) {
    setRegistroPressedState(false);
    setRegistroMsg('Aguarde, concluindo a ação atual...', 'loading');
    return;
  }

  if (!data || !km) {
    releaseRegistroSubmitGuard();
    setRegistroMsg('Informe a data e os km.', 'error');
    return;
  }

  if (!isValidActivityDate(data)) {
    releaseRegistroSubmitGuard();
    setRegistroMsg('Informe uma data válida.', 'error');
    return;
  }

  if (parseValidActivityKm(km) === null) {
    releaseRegistroSubmitGuard();
    setRegistroMsg('Informe um KM válido maior que zero.', 'error');
    return;
  }

  activityMutationInProgress = true;
  syncGlobalBusyState();
  setRegistroMsg('Registrando atividade...', 'loading');
  setRegistroCardState('loading');
  setActivityFormLocked(true);
  const finishLoadingBase = startLoadingState(btn, msg, 'Registrando...');
  const finishLoading = function(nextMessage) {
    finishLoadingBase(nextMessage);
    releaseRegistroSubmitGuard();
    activityMutationInProgress = false;
    syncGlobalBusyState();
    setActivityFormLocked(false);
    if (nextMessage !== 'success') {
      setRegistroCardState('');
    }
  };

  let nextMessage = '';
  let shouldReloadPainel = false;
  try {
    const res = await new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .registrarAtividade(idDgmb, data, km, !!forcarDuplicidade);
    });

    if (!res || !res.ok) {
      nextMessage = 'error';
      if (res && res.code === 'DUPLICIDADE' && !forcarDuplicidade) {
        const confirmar = confirm('Você já registrou esse mesmo valor hoje. Deseja registrar mesmo assim?');
        if (confirmar) {
          salvarAtividade(true);
        } else {
          setRegistroMsg('Registro não confirmado. Nenhuma alteração foi feita.');
        }
        return;
      }

      setRegistroMsg(getGoogleScriptErrorMessage(res, 'Não foi possível registrar a atividade.'), 'error');
      return;
    }

    cancelarEdicaoAtividadeUI();
    setRegistroCardState('success');
    setRegistroMsg('Atividade registrada com sucesso.', 'success', 1800);
    renderAtividadesState('loading', 'Atualizando atividades registradas...', 'Aplicando seu novo pedal na lista.');
    queueRecentActivityHighlight({
      data: data,
      km: km,
      label: 'Novo'
    });
    pendingTotalPedaladoFeedback = true;
    painelProgressFeedbackMode = 'activity-registered';
    shouldReloadPainel = true;
    nextMessage = 'success';
  } catch (err) {
    nextMessage = 'error';
    const errMsg = getGoogleScriptErrorMessage(err, 'Não foi possível registrar a atividade.');
    setRegistroMsg(errMsg, 'error');
    console.error(err);
  } finally {
    finishLoading(nextMessage);
    if (shouldReloadPainel || painelReloadPending) {
      carregarPainel();
    }
  }
}

function iniciarEdicaoAtividadeUI(item) {

async function excluirAtividadeUI(item, btnExcluir) {
  item = item || {};

  const activityId = String(item.activity_id || '').trim();
  const chaveEdicao = String(item.chave_edicao || '').trim();
  const deletionKey = activityId || chaveEdicao;
  if (!deletionKey) {
    return;
  }

  if (pendingDeletionKeys.has(deletionKey)) {
    return;
  }

  const idHidden = document.getElementById('painel-id-dgmb');
  const idDgmb = idHidden && idHidden.value
    ? String(idHidden.value).trim()
    : (currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '');

  const msg = document.getElementById('registro-msg');
  if (!idDgmb || !msg) {
    return;
  }

  if (activityMutationInProgress) {
    setRegistroMsg('Aguarde a conclusão da ação atual para continuar.', 'loading');
    return;
  }

  const confirmar = confirm('Confirma a exclusão desta atividade? Essa ação não pode ser desfeita.');
  if (!confirmar) {
    return;
  }

  pendingDeletionKeys.add(deletionKey);
  activityMutationInProgress = true;
  syncGlobalBusyState();
  setRegistroCardState('loading');
  setActivityFormLocked(true);
  if (btnExcluir) {
    btnExcluir.disabled = true;
    btnExcluir.innerText = 'Excluindo...';
  }

  setRegistroMsg('');

  let removedWithSuccess = false;
  let shouldReloadPainel = false;
  try {
    const res = await new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .excluirAtividade({
          id_dgmb: idDgmb,
          activity_id: activityId,
          chave_edicao: chaveEdicao
        });
    });

    if (!res || !res.ok) {
      setRegistroMsg((res && res.msg) ? res.msg : 'Não foi possível excluir.', 'error');
      return;
    }

    cancelarEdicaoAtividadeUI();
    setRegistroCardState('success');
    setRegistroMsg('Atividade excluída com sucesso.', 'success', 1800);
    renderAtividadesState('loading', 'Atualizando atividades registradas...', 'Removendo a atividade da lista para mostrar a versão mais recente.');
    shouldReloadPainel = true;
    removedWithSuccess = true;
  } catch (err) {
    setRegistroMsg('Não foi possível excluir a atividade.', 'error');
    console.error(err);
  } finally {
    pendingDeletionKeys.delete(deletionKey);
    activityMutationInProgress = false;
    syncGlobalBusyState();
    setActivityFormLocked(false);
    if (!removedWithSuccess) {
      setRegistroCardState('');
    }
    if (btnExcluir) {
      btnExcluir.disabled = false;
      btnExcluir.innerText = 'Excluir';
    }
    if (shouldReloadPainel || painelReloadPending) {
      carregarPainel();
    }
  }
}

function carregarRanking(triggerSource) {
  const idDgmb = currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '';
  const desafioAtual = getDesafioEmFocoAtual();
  atualizarCabecalhoTelaRanking(desafioAtual);
  const desafioRequestKey = getDesafioKey(desafioAtual);

  if (rankingLoadInProgress) {
    rankingReloadPending = true;
    if (triggerSource === 'manual') {
      setPainelMsg('Atualizando ranking do desafio em foco...', 'loading');
    }
    setRankingMsg('Atualizando ranking do desafio em foco...', 'loading');
    return;
  }

  rankingLoadInProgress = true;
  rankingReloadPending = false;
  rankingLoadRequestId += 1;
  const requestId = rankingLoadRequestId;
  syncGlobalBusyState();
  setRankingLoadDisabled(true);
  showScreen('ranking');
  setRankingMsg('Atualizando ranking do desafio em foco...', 'loading');
  renderRankingState('loading', 'Atualizando ranking do desafio em foco', 'Estamos preparando a lista com os participantes e as quilometragens registradas.');

  try {
    google.script.run
      .withSuccessHandler(function(res) {
        try {
          if (requestId !== rankingLoadRequestId) {
            return;
          }

          if (!res || !res.ok) {
            setRankingMsg((res && res.msg) ? res.msg : 'Erro ao carregar ranking.', 'error');
            renderRankingState('error', 'Não foi possível carregar o ranking.', 'Tente novamente em instantes para atualizar a classificação.');
            return;
          }

          setRankingMsg('Ranking do desafio atualizado com sucesso. Confira a lista abaixo.', 'success', 2600);
          renderRanking(Array.isArray(res.data) ? res.data : []);
          showRankingLoadSuccessFeedback();
        } catch (errSuccess) {
          setRankingMsg('Erro ao processar ranking.', 'error');
          renderRankingState('error', 'Não foi possível carregar o ranking.', 'Tente novamente em instantes para atualizar a classificação.');
          console.error(errSuccess);
        } finally {
          if (requestId !== rankingLoadRequestId) {
            return;
          }
          rankingLoadInProgress = false;
          syncGlobalBusyState();
          setRankingLoadDisabled(false);
          if (rankingReloadPending || desafioRequestKey !== getDesafioKey(getDesafioEmFocoAtual())) {
            carregarRanking('manual');
          }
        }
      })
      .withFailureHandler(function(err) {
        if (requestId !== rankingLoadRequestId) {
          return;
        }
        rankingLoadInProgress = false;
        syncGlobalBusyState();
        setRankingLoadDisabled(false);
        setRankingMsg('Erro ao carregar ranking.', 'error');
        renderRankingState('error', 'Não foi possível carregar o ranking.', 'Confira sua conexão e tente novamente em instantes.');
        console.error(err);
        if (rankingReloadPending || desafioRequestKey !== getDesafioKey(getDesafioEmFocoAtual())) {
          carregarRanking('manual');
        }
      })
      .getRanking(
        idDgmb,
        desafioAtual && desafioAtual.id_desafio,
        desafioAtual && desafioAtual.id_item_estoque
      );
  } catch (errRun) {
    if (requestId !== rankingLoadRequestId) {
      return;
    }
    rankingLoadInProgress = false;
    syncGlobalBusyState();
    setRankingLoadDisabled(false);
    setRankingMsg('Erro ao carregar ranking.', 'error');
    renderRankingState('error', 'Não foi possível carregar o ranking.', 'Confira sua conexão e tente novamente em instantes.');
    console.error(errRun);
    if (rankingReloadPending || desafioRequestKey !== getDesafioKey(getDesafioEmFocoAtual())) {
      carregarRanking('manual');
    }
  }
}

function renderRankingState(variant, title, description) {
  const box = document.getElementById('ranking-lista');
  if (!box) return;

  const safeVariant = escapeHtml(variant || 'empty');
  const safeTitle = escapeHtml(title || '');
  const safeDescription = escapeHtml(description || '');
  const loadingDetails = safeVariant === 'loading'
    ? '<div class="ranking-state-skeleton" aria-hidden="true"><span></span><span></span><span></span></div>'
    : '';

  box.innerHTML =
    '<div class="atividade atividade-empty ranking-state ranking-state-' + safeVariant + '">' +
      '<div class="ranking-state-label">' + (
        safeVariant === 'loading' ? 'Atualizando' :
        safeVariant === 'error' ? 'Atenção' :
        'Ranking do desafio'
      ) + '</div>' +
      '<strong>' + safeTitle + '</strong>' +
      '<p>' + safeDescription + '</p>' +
      loadingDetails +
    '</div>';
}

function renderRanking(lista) {
  const box = document.getElementById('ranking-lista');
  if (!box) return;

  box.innerHTML = '';
  const currentUserId = currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '';

  if (!Array.isArray(lista) || !lista.length) {
    renderRankingState('empty', 'Ainda não há participantes com km registrado.', 'Assim que as primeiras quilometragens forem lançadas, o ranking do desafio aparecerá aqui.');
    return;
  }

  lista.forEach(function(item, index) {
    item = item || {};
    const itemId = item.id_dgmb ? String(item.id_dgmb).trim() : '';
    const isCurrentUser = !!currentUserId && !!itemId && currentUserId === itemId;
    const div = document.createElement('div');
    div.className = 'atividade ranking-item' + (isCurrentUser ? ' ranking-item-self' : '');
    div.innerHTML =
      '<strong>' + (index + 1) + '. ' + escapeHtml(item.nome || '') + ' - ' + escapeHtml(item.cidade_uf || '') + (isCurrentUser ? ' <span class="ranking-item-self-badge">Você</span>' : '') + '</strong>' +
      '<p>' + formatNumber(item.realizado) + ' de ' + formatNumber(item.meta) + ' km</p>' +
      '<p>Faltam ' + formatNumber(item.restante) + ' km</p>';
    box.appendChild(div);
  });
}

function getDesafioEmFocoAtual() {

}

function formatDateBR(value) {
  if (!value) return '';
  const s = String(value);
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const parts = s.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  return s;
}

function formatNumber(value) {
  const n = toFiniteNumber(value, 0);
  if (Number.isInteger(n)) return String(n);
  return n.toFixed(1).replace('.', ',');
}

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

      if (!res || res.ok !== true) {
        setAdminCertMsg((res && res.msg) ? res.msg : 'Não foi possível carregar as pendências.', 'error');
        return;
      }

      renderAdminValidacaoLista(res.data || []);
      setAdminCertMsg('Pendências atualizadas.', 'success', 2200);

      '<div class="desafio-metricas-grid">' +

        '<p><span>Status validação</span><strong>' + escapeHtml(String(item.status_validacao_certificado || '-')) + '</strong></p>' +
      '</div>' +
      '<p class="admin-cert-link-wrap"><a href="' + escapeHtml(String(item.link_print_strava || '#')) + '" target="_blank" rel="noopener">Abrir print do Strava</a></p>' +
      '<label for="' + idCard + '">Observação</label>' +

      '<div class="atividade-acoes admin-cert-actions">' +

  });
}

function atualizarStatusAdminValidacao(item, novoStatus, obsInputId) {
  if (!isAdminValidacaoUser()) {
    setAdminCertMsg('Acesso negado. Esta área é restrita ao ID_DGMB 1133.', 'error');
    return;
  }

  var obsInput = document.getElementById(obsInputId);
  var observacao = obsInput ? String(obsInput.value || '').trim() : '';
  if (novoStatus === 'REPROVADO' && !observacao) {
    setAdminCertMsg('Informe uma observação para reprovar o certificado.', 'error');
    return;
  }

  setAdminCertMsg('Atualizando validação...', 'loading');

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || res.ok !== true) {
        setAdminCertMsg((res && res.msg) ? res.msg : 'Não foi possível atualizar o status.', 'error');
        return;
      }

      setAdminCertMsg('Status atualizado para ' + novoStatus + '.', 'success', 2200);
      carregarAdminValidacaoPendencias();
    })
    .withFailureHandler(function() {
      setAdminCertMsg('Erro de conexão ao atualizar validação.', 'error');
    })
    .atualizarStatusValidacaoCertificadoAdmin({
      admin_id_dgmb: String(currentUser.id_dgmb || '').trim(),
      id_dgmb: item.id_dgmb || '',
      id_desafio: item.id_desafio || '',
      id_item_estoque: item.id_item_estoque || '',
      novo_status: novoStatus,
      observacao: observacao
    });
}
