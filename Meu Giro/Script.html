<script>
let currentUser = null;
const pendingDeletionKeys = new Set();
let currentPainel = null;
let activeEditKey = '';
let pendingEditSaveKey = '';
let loginInProgress = false;
let painelLoadInProgress = false;
let painelReloadPending = false;
let painelLoadRequestId = 0;
let rankingLoadInProgress = false;
let phraseLoadInProgress = false;
let phraseFeedbackTimeout = null;
let activityMutationInProgress = false;
let registroCardFeedbackTimer = null;
const statusMessageTimers = {};

function syncGlobalBusyState() {
  const root = document.body;
  if (!root) return;

  const isBusy = loginInProgress
    || painelLoadInProgress
    || rankingLoadInProgress
    || phraseLoadInProgress
    || activityMutationInProgress;

  root.classList.toggle('app-busy', isBusy);
}

function showScreen(name) {
  const screens = document.querySelectorAll('.screen');
  screens.forEach(function(screen) {
    screen.classList.remove('active');
  });

  const target = document.getElementById('screen-' + name);
  if (target) {
    target.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function onlyDigits(value) {
  return String(value || '').replace(/\D/g, '');
}

function readInputValue(inputEl) {
  return String((inputEl && inputEl.value) || '').trim();
}

function startLoadingState(btn, msg, loadingText) {
  const text = String(loadingText || 'Processando...');
  let finalized = false;

  if (msg) msg.innerText = text;
  if (btn) btn.disabled = true;

  return function finishLoadingState(nextMessage) {
    if (finalized) return;
    finalized = true;

    if (btn) btn.disabled = false;

    if (msg && typeof nextMessage === 'string') {
      msg.innerText = nextMessage;
    }
  };
}

function setTransientStatus(elementId, message, variant, timeoutMs) {
  const el = document.getElementById(elementId);
  if (!el) return;

  if (statusMessageTimers[elementId]) {
    clearTimeout(statusMessageTimers[elementId]);
    delete statusMessageTimers[elementId];
  }

  const text = String(message || '').trim();
  el.innerText = text;
  el.className = 'msg status-msg';

  if (!text) {
    return;
  }

  el.classList.add('is-visible');

  if (variant === 'loading') {
    el.classList.add('msg-loading');
  } else if (variant === 'error') {
    el.classList.add('msg-error');
  } else if (variant === 'success') {
    el.classList.add('msg-success');
  }

  if (Number(timeoutMs) > 0) {
    statusMessageTimers[elementId] = setTimeout(function() {
      if (el) {
        el.innerText = '';
        el.className = 'msg status-msg';
      }
      delete statusMessageTimers[elementId];
    }, Number(timeoutMs));
  }
}

function applyCpfMask(value) {
  const digits = onlyDigits(value).slice(0, 11);
  if (digits.length <= 3) return digits;
  if (digits.length <= 6) return digits.replace(/(\d{3})(\d+)/, '$1.$2');
  if (digits.length <= 9) return digits.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
  return digits.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
}

document.addEventListener('DOMContentLoaded', function() {
  const cpfInput = document.getElementById('cpf');
  const params = new URLSearchParams(window.location.search);
  const cpfPrefill = onlyDigits(params.get('cpf') || '');

  if (cpfInput) {
    if (cpfPrefill.length === 11) {
      cpfInput.value = applyCpfMask(cpfPrefill);
    }

    cpfInput.addEventListener('input', function(e) {
      e.target.value = applyCpfMask(e.target.value);
    });
  }
});

function login() {
  const cpfInput = document.getElementById('cpf');
  const msg = document.getElementById('login-msg');
  const btn = document.getElementById('btn-login');

  if (!cpfInput || !msg || !btn) return;

  if (loginInProgress) {
    setTransientStatus('login-msg', 'Verificando acesso...', 'loading');
    return;
  }

  const cpf = readInputValue(cpfInput);

  loginInProgress = true;
  syncGlobalBusyState();
  setTransientStatus('login-msg', 'Verificando acesso...', 'loading');
  const finishLoadingBase = startLoadingState(btn, msg, 'Verificando acesso...');
  const finishLoading = function(nextMessage) {
    finishLoadingBase(nextMessage);
    loginInProgress = false;
    syncGlobalBusyState();
  };

  try {
    google.script.run
      .withSuccessHandler(function(res) {
        finishLoading();

        if (!res || !res.ok) {
          setTransientStatus('login-msg', (res && res.msg) ? res.msg : 'Não foi possível entrar.', 'error');
          return;
        }

        const userId = res.data && res.data.id_dgmb ? String(res.data.id_dgmb).trim() : '';
        if (!userId) {
          currentUser = null;
          setTransientStatus('login-msg', 'Sessão inválida. Entre novamente.', 'error');
          return;
        }

        currentUser = {
          id_dgmb: userId,
          nome: res.data && res.data.nome ? res.data.nome : '',
          cidade_uf: res.data && res.data.cidade_uf ? res.data.cidade_uf : ''
        };

        setTransientStatus('login-msg', '');

        showScreen('painel');
        carregarPainel();
      })
      .withFailureHandler(function(err) {
        finishLoading();
        setTransientStatus('login-msg', 'Erro de conexão. Tente novamente.', 'error');
        console.error(err);
      })
      .loginCPF(cpf);
  } catch (err) {
    finishLoading();
    setTransientStatus('login-msg', 'Erro de conexão. Tente novamente.', 'error');
    console.error(err);
  }
}

function setPainelMsg(message, variant, timeoutMs) {
  setTransientStatus('painel-msg', message, variant, timeoutMs);
  syncPainelErrorState(message, variant);
}

function setRegistroMsg(message, variant, timeoutMs) {
  setTransientStatus('registro-msg', message, variant, timeoutMs);
}

function setRankingMsg(message, variant, timeoutMs) {
  setTransientStatus('ranking-msg', message, variant, timeoutMs);
  const el = document.getElementById('ranking-msg');
  if (el && String(message || '').trim()) {
    el.classList.add('msg-inline');
  }
}

function setManualPainelRefreshDisabled(disabled) {
  const topBtn = document.getElementById('btn-meu-giro-top');
  const homeBtn = document.getElementById('btn-meu-giro-home');
  const retryBtn = document.getElementById('btn-painel-retry');

  if (topBtn) topBtn.disabled = !!disabled;
  if (homeBtn) homeBtn.disabled = !!disabled;
  if (retryBtn) retryBtn.disabled = !!disabled;
}

function syncPainelErrorState(message, variant) {
  const errorState = document.getElementById('painel-error-state');
  if (!errorState) return;

  const hasMessage = !!String(message || '').trim();
  const shouldShow = variant === 'error' && hasMessage;
  errorState.hidden = !shouldShow;
}

function setRankingLoadDisabled(disabled) {
  const topBtn = document.getElementById('btn-ranking-top');
  const painelBtn = document.getElementById('btn-ranking-painel');

  if (topBtn) topBtn.disabled = !!disabled;
  if (painelBtn) painelBtn.disabled = !!disabled;
}

function setPhraseButtonLoading(disabled) {
  const btn = document.getElementById('btnOutraMensagem');
  if (!btn) return;

  btn.disabled = !!disabled;
  btn.innerText = disabled ? 'Buscando nova mensagem...' : 'Outra mensagem';
}

function setPhraseFeedback(message, variant) {
  const feedback = document.getElementById('frase-feedback');
  const phraseBox = document.getElementById('frase-box');
  const text = String(message || '').trim();

  if (phraseFeedbackTimeout) {
    clearTimeout(phraseFeedbackTimeout);
    phraseFeedbackTimeout = null;
  }

  if (!feedback) return;

  feedback.classList.remove('is-visible', 'phrase-feedback-loading', 'phrase-feedback-success');

  if (phraseBox) {
    phraseBox.classList.remove('phrase-box-updated');
  }

  feedback.textContent = text;

  if (!text) return;

  if (variant === 'loading') {
    feedback.classList.add('is-visible', 'phrase-feedback-loading');
    return;
  }

  if (variant === 'success') {
    feedback.classList.add('is-visible', 'phrase-feedback-success');

    if (phraseBox) {
      phraseBox.classList.add('phrase-box-updated');
    }

    phraseFeedbackTimeout = setTimeout(function() {
      feedback.textContent = '';
      feedback.classList.remove('is-visible', 'phrase-feedback-success');

      if (phraseBox) {
        phraseBox.classList.remove('phrase-box-updated');
      }

      phraseFeedbackTimeout = null;
    }, 2400);
  }
}

function setRegistroCardState(state) {
  const card = document.getElementById('registro-card');
  if (!card) return;

  if (registroCardFeedbackTimer) {
    clearTimeout(registroCardFeedbackTimer);
    registroCardFeedbackTimer = null;
  }

  card.classList.remove('is-loading', 'is-success');

  if (state === 'loading') {
    card.classList.add('is-loading');
    return;
  }

  if (state === 'success') {
    card.classList.add('is-success');
    registroCardFeedbackTimer = setTimeout(function() {
      card.classList.remove('is-success');
      registroCardFeedbackTimer = null;
    }, 1900);
  }
}

function markAtividadesRefreshing() {
  const box = document.getElementById('atividades-lista');
  if (!box) return;

  box.classList.add('lista-refreshing');
}

function animateAtividadesEntry(box) {
  if (!box) return;

  box.classList.remove('lista-refreshing');

  const items = box.querySelectorAll('.atividade:not(.atividade-state)');
  if (!items.length) return;

  items.forEach(function(item, index) {
    item.classList.add('atividade-enter');
    item.style.transitionDelay = Math.min(index * 45, 180) + 'ms';
  });

  requestAnimationFrame(function() {
    items.forEach(function(item) {
      item.classList.add('is-visible');
    });
  });

  window.setTimeout(function() {
    items.forEach(function(item) {
      item.classList.remove('atividade-enter', 'is-visible');
      item.style.transitionDelay = '';
    });
  }, 420);
}

function setActivityFormLocked(disabled) {
  const cancelBtn = document.getElementById('btn-cancelar-edicao');
  const dataInput = document.getElementById('data-atividade');
  const kmInput = document.getElementById('km-atividade');
  const quickButtons = document.querySelectorAll('.quick-km-btn');

  if (cancelBtn) cancelBtn.disabled = !!disabled;
  if (dataInput) dataInput.disabled = !!disabled;
  if (kmInput) kmInput.disabled = !!disabled;

  quickButtons.forEach(function(btn) {
    btn.disabled = !!disabled;
  });
}

function resetPainelVisualState() {
  currentPainel = null;
  renderPainel({
    atividades: [],
    frase: 'Cada quilômetro conta. Continue no seu ritmo.'
  });
  renderAtividadesState('loading', 'Carregando atividades registradas...', 'Estamos preparando a área com seus pedais mais recentes.');
}

function carregarPainel(triggerSource) {
  if (!currentUser || !currentUser.id_dgmb) {
    setTransientStatus('login-msg', 'Sua sessão expirou. Entre novamente.', 'error');
    showScreen('login');
    return;
  }

  if (painelLoadInProgress) {
    painelReloadPending = true;
    setPainelMsg(triggerSource === 'manual'
      ? 'Atualização em andamento...'
      : 'Atualizando painel...',
      'loading');
    return;
  }

  painelLoadInProgress = true;
  syncGlobalBusyState();
  painelReloadPending = false;
  painelLoadRequestId += 1;
  const requestId = painelLoadRequestId;

  setManualPainelRefreshDisabled(true);
  if (!currentPainel) {
    resetPainelVisualState();
  }
  setPainelMsg(triggerSource === 'manual' ? 'Atualizando painel...' : 'Carregando painel...', 'loading');

  google.script.run
    .withSuccessHandler(function(res) {
      if (requestId !== painelLoadRequestId) {
        return;
      }

      painelLoadInProgress = false;
      syncGlobalBusyState();
      setManualPainelRefreshDisabled(false);

      if (!res || !res.ok) {
        setPainelMsg((res && res.msg) ? res.msg : 'Erro ao carregar painel. Tente novamente.', 'error');
        painelReloadPending = false;
        return;
      }

      setPainelMsg(
        triggerSource === 'manual' ? 'Painel atualizado com sucesso.' : 'Painel pronto.',
        'success',
        triggerSource === 'manual' ? 2200 : 1600
      );
      currentPainel = res.data || {};
      renderPainel(currentPainel);

      if (painelReloadPending) {
        carregarPainel();
      }
    })
    .withFailureHandler(function(err) {
      if (requestId !== painelLoadRequestId) {
        return;
      }

      painelLoadInProgress = false;
      syncGlobalBusyState();
      setManualPainelRefreshDisabled(false);
      setPainelMsg('Erro de conexão ao atualizar painel.', 'error');
      console.error(err);
      painelReloadPending = false;
    })
    .getPainelUsuario(currentUser.id_dgmb);
}

function renderPainel(p) {
  setTextById('painel-nome', p.nome || '');
  setTextById('painel-cidade', p.cidade_uf || '');

  var idHidden = document.getElementById('painel-id-dgmb');
  if (idHidden) {
    idHidden.value = String(p.id_dgmb || (currentUser && currentUser.id_dgmb) || '').trim();
  }

  setTextById('meta-km', formatNumber(p.meta));
  setTextById('realizado-km', formatNumber(p.realizado));
  setTextById('restante-km', formatNumber(p.restante));

  setTextById('progress-text',
    formatNumber(p.realizado) + ' km de ' + formatNumber(p.meta) + ' km');

  setTextById('progress-percent', formatNumber(p.percentual) + '%');

  const bar = document.getElementById('progress-bar');
  if (bar) {
    bar.style.width = Math.max(0, Math.min(100, toFiniteNumber(p.percentual, 0))) + '%';
  }

  setTextById('ritmo-dia', 'Dia ' + formatNumber(p.diaAtual) + ' do desafio.');

  setTextById('ritmo-ideal', formatNumber(p.kmIdealAtual) + ' km');

  setTextById('ritmo-atual', 'Você tem ' + formatNumber(p.realizado) + ' km.');

  setTextById('ritmo-restante', formatNumber(p.diasRestantes) + ' dias');

  setTextById('ritmo-meta', formatNumber(p.kmPorDiaRestante) + ' km/dia');

  setTextById('frase-box', p.frase || 'Cada quilômetro conta. Continue no seu ritmo.');

  const posicaoRanking = firstDefined([p.posicao_ranking, p.posicaoRanking]);
  const totalParticipantes = firstDefined([p.total_participantes, p.totalParticipantes]);
  const hasPosicaoRanking = isValidRankingPosition(posicaoRanking);
  const posicaoRankingEl = document.getElementById('painel-posicao-ranking');
  const posicaoDetalheEl = document.getElementById('painel-posicao-detalhe');

  if (posicaoRankingEl) {
    posicaoRankingEl.innerText = hasPosicaoRanking
      ? 'Sua posição no ranking: ' + formatNumber(posicaoRanking)
      : 'Ranking ainda indisponível.';
  }

  if (posicaoDetalheEl) {
    posicaoDetalheEl.innerText = Number.isFinite(Number(totalParticipantes))
      ? 'Base atual: ' + formatNumber(totalParticipantes) + ' participantes.'
      : 'Disponível quando houver base de comparação.';
  }

  renderAtividades(p.atividades || []);
  setTextById('total-pedalado', formatNumber(p.totalPedalado || p.realizado || 0));
}

function setTextById(id, text) {
  const el = document.getElementById(id);
  if (el) {
    el.innerText = text;
  }
}

function firstDefined(values) {
  for (var i = 0; i < values.length; i++) {
    if (values[i] !== null && values[i] !== undefined && values[i] !== '') {
      return values[i];
    }
  }
  return null;
}

function isValidRankingPosition(value) {
  const numberValue = Number(value);
  return Number.isFinite(numberValue) && numberValue > 0;
}

function renderAtividades(lista) {
  const box = document.getElementById('atividades-lista');
  if (!box) return;

  box.innerHTML = '';

  if (!Array.isArray(lista) || !lista.length) {
    renderAtividadesState('empty', 'Nenhuma atividade registrada ainda.', 'Assim que você registrar um pedal, a lista aparecerá aqui com data e quilometragem.');
    return;
  }

  lista.forEach(function(item) {
    item = item || {};
    const div = document.createElement('div');
    div.className = 'atividade';
    if (item.activity_id) {
      div.setAttribute('data-activity-id', String(item.activity_id).trim());
    }
    if (item.chave_edicao) {
      div.setAttribute('data-chave-edicao', String(item.chave_edicao).trim());
    }

    const info = document.createElement('div');
    info.innerText = 'Dia ' + formatDateBR(item.data) + ' - ' + formatNumber(item.km) + ' km';
    div.appendChild(info);

    const actions = document.createElement('div');
    actions.className = 'atividade-acoes';

    const btnEditar = document.createElement('button');
    btnEditar.type = 'button';
    btnEditar.className = 'btn-secondary atividade-acao-btn';
    btnEditar.innerText = 'Editar';
    const editKey = String(item.activity_id || '').trim() || String(item.chave_edicao || '').trim();
    if (editKey) {
      if (activeEditKey && activeEditKey !== editKey) {
        btnEditar.disabled = true;
      }
      if (activeEditKey && activeEditKey === editKey) {
        btnEditar.disabled = true;
        btnEditar.innerText = 'Editando';
      }
      btnEditar.onclick = function() {
        iniciarEdicaoAtividadeUI(item);
      };
    } else {
      btnEditar.disabled = true;
    }
    const btnExcluir = document.createElement('button');
    btnExcluir.type = 'button';
    btnExcluir.className = 'btn-secondary atividade-acao-btn';
    btnExcluir.innerText = 'Excluir';
    const deleteKey = String(item.activity_id || '').trim() || String(item.chave_edicao || '').trim();
    if (deleteKey) {
      btnExcluir.onclick = function() {
        excluirAtividadeUI(item, btnExcluir);
      };
    } else {
      btnExcluir.disabled = true;
    }
    actions.appendChild(btnEditar);
    actions.appendChild(btnExcluir);
    div.appendChild(actions);

    box.appendChild(div);
  });

  animateAtividadesEntry(box);
}

function renderAtividadesState(variant, title, description) {
  const box = document.getElementById('atividades-lista');
  if (!box) return;

  if (variant === 'loading') {
    markAtividadesRefreshing();
  } else {
    box.classList.remove('lista-refreshing');
  }

  const safeVariant = escapeHtml(variant || 'empty');
  const safeTitle = escapeHtml(title || '');
  const safeDescription = escapeHtml(description || '');
  const loadingDetails = safeVariant === 'loading'
    ? '<div class="atividade-state-skeleton" aria-hidden="true"><span></span><span></span><span></span></div>'
    : '';

  box.innerHTML =
    '<div class="atividade atividade-empty atividade-state atividade-state-' + safeVariant + '">' +
      '<div class="atividade-state-label">' + (
        safeVariant === 'loading' ? 'Atualizando' : 'Sua lista'
      ) + '</div>' +
      '<strong>' + safeTitle + '</strong>' +
      '<p>' + safeDescription + '</p>' +
      loadingDetails +
    '</div>';
}

function toFiniteNumber(value, fallback) {
  const n = Number(value);
  return Number.isFinite(n) ? n : Number(fallback || 0);
}

function salvarAtividade(forcarDuplicidade) {
  const idHidden = document.getElementById('painel-id-dgmb');
  const idDgmb = idHidden && idHidden.value
    ? String(idHidden.value).trim()
    : (currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '');

  const dataInput = document.getElementById('data-atividade');
  const kmInput = document.getElementById('km-atividade');
  const msg = document.getElementById('registro-msg');
  const btn = document.getElementById('btn-salvar');

  if (!dataInput || !kmInput || !msg || !btn) return;

  const data = readInputValue(dataInput);
  const km = readInputValue(kmInput);

  setRegistroMsg('');

  if (!idDgmb) {
    setRegistroMsg('Sessão inválida. Entre novamente.', 'error');
    return;
  }

  if (activityMutationInProgress || btn.disabled) {
    setRegistroMsg('Processando registro...', 'loading');
    return;
  }

  if (!data || !km) {
    setRegistroMsg('Informe a data e os km.', 'error');
    return;
  }

  activityMutationInProgress = true;
  syncGlobalBusyState();
  setRegistroMsg('Registrando atividade...', 'loading');
  setRegistroCardState('loading');
  setActivityFormLocked(true);
  const finishLoadingBase = startLoadingState(btn, msg, 'Registrando...');
  const finishLoading = function(nextMessage) {
    finishLoadingBase(nextMessage);
    activityMutationInProgress = false;
    syncGlobalBusyState();
    setActivityFormLocked(false);
    if (nextMessage !== 'success') {
      setRegistroCardState('');
    }
  };

  try {
    google.script.run
      .withSuccessHandler(function(res) {
        finishLoading();

        if (!res || !res.ok) {
          if (res && res.code === 'DUPLICIDADE' && !forcarDuplicidade) {
            const confirmar = confirm('Você já registrou uma atividade com esse valor hoje. Deseja continuar?');
            if (confirmar) {
              salvarAtividade(true);
            } else {
              setRegistroMsg('Registro cancelado.');
            }
            return;
          }

          setRegistroMsg((res && res.msg) ? res.msg : 'Não foi possível registrar a atividade.', 'error');
          return;
        }

        cancelarEdicaoAtividadeUI();
        setRegistroCardState('success');
        setRegistroMsg('Atividade registrada.', 'success', 1800);
        renderAtividadesState('loading', 'Atualizando atividades registradas...', 'Aplicando seu novo pedal na lista.');
        carregarPainel();
      })
      .withFailureHandler(function(err) {
        finishLoading();
        setRegistroMsg('Erro ao registrar atividade.', 'error');
        console.error(err);
      })
      .registrarAtividade(idDgmb, data, km, !!forcarDuplicidade);
  } catch (err) {
    finishLoading();
    setRegistroMsg('Erro ao registrar atividade.', 'error');
    console.error(err);
  }
}

function salvarEdicaoAtividade() {
  const idHidden = document.getElementById('painel-id-dgmb');
  const idDgmb = idHidden && idHidden.value
    ? String(idHidden.value).trim()
    : (currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '');

  const dataInput = document.getElementById('data-atividade');
  const kmInput = document.getElementById('km-atividade');
  const msg = document.getElementById('registro-msg');
  const btn = document.getElementById('btn-salvar');
  const chaveEdicaoInput = document.getElementById('atividade-id');
  const activityIdInput = document.getElementById('atividade-activity-id');

  if (!dataInput || !kmInput || !msg || !btn || !chaveEdicaoInput || !activityIdInput) return;

  const data = readInputValue(dataInput);
  const km = readInputValue(kmInput);
  const chaveEdicao = String(chaveEdicaoInput.value || '').trim();
  const activityId = String(activityIdInput.value || '').trim();
  const editKey = activityId || chaveEdicao;

  setRegistroMsg('');

  if (!idDgmb || !editKey) {
    setRegistroMsg('Sessão ou atividade inválida.', 'error');
    return;
  }

  if (activityMutationInProgress || pendingEditSaveKey === editKey || btn.disabled) {
    setRegistroMsg('Salvando edição...', 'loading');
    return;
  }

  if (!data || !km) {
    setRegistroMsg('Informe a data e os km.', 'error');
    return;
  }

  pendingEditSaveKey = editKey;
  activityMutationInProgress = true;
  syncGlobalBusyState();
  setRegistroMsg('Salvando edição...', 'loading');
  setRegistroCardState('loading');
  setActivityFormLocked(true);
  const finishLoadingBase = startLoadingState(btn, msg, 'Salvando edição...');
  const finishLoading = function(nextMessage) {
    finishLoadingBase(nextMessage);
    pendingEditSaveKey = '';
    activityMutationInProgress = false;
    syncGlobalBusyState();
    setActivityFormLocked(false);
    if (nextMessage !== 'success') {
      setRegistroCardState('');
    }
  };

  try {
    google.script.run
      .withSuccessHandler(function(res) {
        finishLoading();

        if (!res || !res.ok) {
          setRegistroMsg((res && res.msg) ? res.msg : 'Não foi possível salvar a edição.', 'error');
          return;
        }

        cancelarEdicaoAtividadeUI();
        setRegistroCardState('success');
        setRegistroMsg('Edição salva.', 'success', 1800);
        renderAtividadesState('loading', 'Atualizando atividades registradas...', 'Aplicando a edição na lista.');
        carregarPainel();
      })
      .withFailureHandler(function(err) {
        finishLoading();
        setRegistroMsg('Erro ao salvar edição.', 'error');
        console.error(err);
      })
      .editarAtividade({
        id_dgmb: idDgmb,
        activity_id: activityId,
        chave_edicao: chaveEdicao,
        data_atividade: data,
        km: km
      });
  } catch (err) {
    finishLoading();
    setRegistroMsg('Erro ao salvar edição.', 'error');
    console.error(err);
  }
}
function iniciarEdicaoAtividadeUI(item) {
  item = item || {};

  const activityId = String(item.activity_id || '').trim();
  const chaveEdicao = String(item.chave_edicao || '').trim();
  const editKey = activityId || chaveEdicao;

  if (!editKey) {
    return;
  }

  const registroMsg = document.getElementById('registro-msg');
  if (activeEditKey && activeEditKey !== editKey) {
    if (registroMsg) setRegistroMsg('Finalize ou cancele a edição atual.', 'error');
    return;
  }

  if (activeEditKey === editKey) {
    if (registroMsg) setRegistroMsg('Esta atividade já está em edição.');
    return;
  }

  activeEditKey = editKey;

  const idInput = document.getElementById('atividade-id');
  if (idInput) idInput.value = chaveEdicao;

  const activityIdInput = document.getElementById('atividade-activity-id');
  if (activityIdInput) activityIdInput.value = activityId;

  const dataInput = document.getElementById('data-atividade');
  if (dataInput) dataInput.value = String(item.data || '').trim();

  const kmInput = document.getElementById('km-atividade');
  if (kmInput) kmInput.value = formatNumber(item.km);

  const cancelBtn = document.getElementById('btn-cancelar-edicao');
  if (cancelBtn) cancelBtn.style.display = '';

  const saveBtn = document.getElementById('btn-salvar');
  if (saveBtn) {
    saveBtn.innerText = 'Salvar edição';
    saveBtn.setAttribute('onclick', 'salvarEdicaoAtividade()');
  }

  if (registroMsg) setRegistroMsg('Editando atividade.');

  if (currentPainel && Array.isArray(currentPainel.atividades)) {
    renderAtividades(currentPainel.atividades);
  }
}

function excluirAtividadeUI(item, btnExcluir) {
  item = item || {};

  const activityId = String(item.activity_id || '').trim();
  const chaveEdicao = String(item.chave_edicao || '').trim();
  const deletionKey = activityId || chaveEdicao;
  if (!deletionKey) {
    return;
  }

  if (pendingDeletionKeys.has(deletionKey)) {
    return;
  }

  const idHidden = document.getElementById('painel-id-dgmb');
  const idDgmb = idHidden && idHidden.value
    ? String(idHidden.value).trim()
    : (currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '');

  const msg = document.getElementById('registro-msg');
  if (!idDgmb || !msg) {
    return;
  }

  if (activityMutationInProgress) {
    setRegistroMsg('Aguarde a ação atual terminar.', 'loading');
    return;
  }

  const confirmar = confirm('Deseja excluir esta atividade?');
  if (!confirmar) {
    return;
  }

  pendingDeletionKeys.add(deletionKey);
  activityMutationInProgress = true;
  syncGlobalBusyState();
  setRegistroCardState('loading');
  setActivityFormLocked(true);
  if (btnExcluir) {
    btnExcluir.disabled = true;
    btnExcluir.innerText = 'Excluindo...';
  }

  setRegistroMsg('');

  google.script.run
    .withSuccessHandler(function(res) {
      pendingDeletionKeys.delete(deletionKey);
      activityMutationInProgress = false;
      syncGlobalBusyState();
      setRegistroCardState('');
      setActivityFormLocked(false);

      if (!res || !res.ok) {
        if (btnExcluir) {
          btnExcluir.disabled = false;
          btnExcluir.innerText = 'Excluir';
        }
        setRegistroMsg((res && res.msg) ? res.msg : 'Não foi possível excluir.', 'error');
        return;
      }

      cancelarEdicaoAtividadeUI();
      setRegistroCardState('success');
      setRegistroMsg('Atividade excluída.', 'success', 1800);
      renderAtividadesState('loading', 'Atualizando atividades registradas...', 'Removendo a atividade da lista para mostrar a versão mais recente.');
      carregarPainel();
    })
    .withFailureHandler(function(err) {
      pendingDeletionKeys.delete(deletionKey);
      activityMutationInProgress = false;
      syncGlobalBusyState();
      setRegistroCardState('');
      setActivityFormLocked(false);
      if (btnExcluir) {
        btnExcluir.disabled = false;
        btnExcluir.innerText = 'Excluir';
      }
      setRegistroMsg('Erro ao excluir atividade.', 'error');
      console.error(err);
    })
    .excluirAtividade({
      id_dgmb: idDgmb,
      activity_id: activityId,
      chave_edicao: chaveEdicao
    });
}

function novaFrase() {
  if (!currentUser || !currentUser.id_dgmb || phraseLoadInProgress) return;

  phraseLoadInProgress = true;
  syncGlobalBusyState();
  setPhraseButtonLoading(true);
  setPhraseFeedback('Atualizando sua mensagem motivacional...', 'loading');

  google.script.run
    .withSuccessHandler(function(res) {
      phraseLoadInProgress = false;
      syncGlobalBusyState();
      setPhraseButtonLoading(false);
      if (res && res.ok && res.data && res.data.frase) {
        setTextById('frase-box', res.data.frase);
        setPhraseFeedback('Mensagem atualizada com sucesso.', 'success');
        return;
      }

      setPhraseFeedback('', '');
    })
    .withFailureHandler(function(err) {
      phraseLoadInProgress = false;
      syncGlobalBusyState();
      setPhraseButtonLoading(false);
      setPhraseFeedback('', '');
      console.error(err);
    })
    .getNovaFrase(currentUser.id_dgmb);
}

function carregarRanking(triggerSource) {
  const idDgmb = currentUser && currentUser.id_dgmb ? String(currentUser.id_dgmb).trim() : '';

  if (rankingLoadInProgress) {
    if (triggerSource === 'manual') {
      setPainelMsg('Atualizando ranking geral...', 'loading');
    }
    setRankingMsg('Atualizando ranking geral...', 'loading');
    return;
  }

  rankingLoadInProgress = true;
  syncGlobalBusyState();
  setRankingLoadDisabled(true);
  showScreen('ranking');
  setRankingMsg('Atualizando ranking geral...', 'loading');
  renderRankingState('loading', 'Atualizando ranking geral', 'Estamos preparando a lista com os participantes e as quilometragens registradas.');

  google.script.run
    .withSuccessHandler(function(res) {
      rankingLoadInProgress = false;
      syncGlobalBusyState();
      setRankingLoadDisabled(false);

      if (!res || !res.ok) {
        setRankingMsg((res && res.msg) ? res.msg : 'Erro ao carregar ranking.', 'error');
        renderRankingState('error', 'Não foi possível carregar o ranking.', 'Tente novamente em instantes para atualizar a classificação.');
        return;
      }

      setRankingMsg('Ranking geral atualizado com sucesso. Confira a lista abaixo.', 'success', 2600);
      renderRanking(res.data || []);
    })
    .withFailureHandler(function(err) {
      rankingLoadInProgress = false;
      syncGlobalBusyState();
      setRankingLoadDisabled(false);
      setRankingMsg('Erro ao carregar ranking.', 'error');
      renderRankingState('error', 'Não foi possível carregar o ranking.', 'Confira sua conexão e tente novamente em instantes.');
      console.error(err);
    })
    .getRanking(idDgmb);
}

function renderRankingState(variant, title, description) {
  const box = document.getElementById('ranking-lista');
  if (!box) return;

  const safeVariant = escapeHtml(variant || 'empty');
  const safeTitle = escapeHtml(title || '');
  const safeDescription = escapeHtml(description || '');
  const loadingDetails = safeVariant === 'loading'
    ? '<div class="ranking-state-skeleton" aria-hidden="true"><span></span><span></span><span></span></div>'
    : '';

  box.innerHTML =
    '<div class="atividade atividade-empty ranking-state ranking-state-' + safeVariant + '">' +
      '<div class="ranking-state-label">' + (
        safeVariant === 'loading' ? 'Atualizando' :
        safeVariant === 'error' ? 'Atenção' :
        'Ranking geral'
      ) + '</div>' +
      '<strong>' + safeTitle + '</strong>' +
      '<p>' + safeDescription + '</p>' +
      loadingDetails +
    '</div>';
}

function renderRanking(lista) {
  const box = document.getElementById('ranking-lista');
  if (!box) return;

  box.innerHTML = '';

  if (!Array.isArray(lista) || !lista.length) {
    renderRankingState('empty', 'Ainda não há participantes com km registrado.', 'Assim que as primeiras quilometragens forem lançadas, o ranking geral aparecerá aqui.');
    return;
  }

  lista.forEach(function(item, index) {
    item = item || {};
    const div = document.createElement('div');
    div.className = 'atividade';
    div.innerHTML =
      '<strong>' + (index + 1) + '. ' + escapeHtml(item.nome || '') + ' - ' + escapeHtml(item.cidade_uf || '') + '</strong><br>' +
      formatNumber(item.realizado) + ' de ' + formatNumber(item.meta) + ' km<br>' +
      'Faltam ' + formatNumber(item.restante) + ' km';
    box.appendChild(div);
  });
}

function formatDateBR(value) {
  if (!value) return '';
  const s = String(value);
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const parts = s.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  return s;
}

function formatNumber(value) {
  const n = toFiniteNumber(value, 0);
  if (Number.isInteger(n)) return String(n);
  return n.toFixed(1).replace('.', ',');
}

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function openMeuGiro() {
  if (currentUser && currentUser.id_dgmb) {
    showScreen('painel');

    if (painelLoadInProgress) {
      setPainelMsg('Atualização em andamento...', 'loading');
      return;
    }

    carregarPainel('manual');
    return;
  }
  const loginMsg = document.getElementById('login-msg');
  if (loginMsg) setTransientStatus('login-msg', 'Sua sessão expirou. Entre novamente.', 'error');
  showScreen('login');
}

function openRankingPrivado() {
  if (currentUser && currentUser.id_dgmb) {
    carregarRanking('manual');
    return;
  }
  const loginMsg = document.getElementById('login-msg');
  if (loginMsg) setTransientStatus('login-msg', 'Sua sessão expirou. Entre novamente.', 'error');
  showScreen('login');
}

function logoutUser() {
  currentUser = null;
  currentPainel = null;
  rankingLoadInProgress = false;
  phraseLoadInProgress = false;
  activityMutationInProgress = false;
  painelLoadInProgress = false;
  painelReloadPending = false;
  if (registroCardFeedbackTimer) {
    clearTimeout(registroCardFeedbackTimer);
    registroCardFeedbackTimer = null;
  }
  syncGlobalBusyState();

  const painelIdInput = document.getElementById('painel-id-dgmb');
  if (painelIdInput) painelIdInput.value = '';

  const loginMsg = document.getElementById('login-msg');
  if (loginMsg) setTransientStatus('login-msg', '');

  const registroMsg = document.getElementById('registro-msg');
  if (registroMsg) setRegistroMsg('');
  setRegistroCardState('');

  setPainelMsg('');
  setRankingMsg('');
  setManualPainelRefreshDisabled(false);
  setRankingLoadDisabled(false);
  setPhraseButtonLoading(false);
  setActivityFormLocked(false);

  const cpfInput = document.getElementById('cpf');
  if (cpfInput) cpfInput.value = '';

  const dataInput = document.getElementById('data-atividade');
  if (dataInput) dataInput.value = '';

  const kmInput = document.getElementById('km-atividade');
  if (kmInput) kmInput.value = '';

  cancelarEdicaoAtividadeUI();

  showScreen('inicio');
}

function verOutraFrase() {
  novaFrase();
}

function addKm(value) {
  const input = document.getElementById('km-atividade');
  if (!input) return;

  const current = toFiniteNumber(readInputValue(input).replace(',', '.'), 0);
  const next = current + toFiniteNumber(value, 0);
  input.value = formatNumber(next);
}

function clearKm() {
  const input = document.getElementById('km-atividade');
  if (input) input.value = '';
}

function cancelarEdicaoAtividadeUI() {
  activeEditKey = '';

  if (currentPainel && Array.isArray(currentPainel.atividades)) {
    renderAtividades(currentPainel.atividades);
  }

  const idInput = document.getElementById('atividade-id');
  if (idInput) idInput.value = '';

  const activityIdInput = document.getElementById('atividade-activity-id');
  if (activityIdInput) activityIdInput.value = '';

  const dataInput = document.getElementById('data-atividade');
  if (dataInput) dataInput.value = '';

  const kmInput = document.getElementById('km-atividade');
  if (kmInput) kmInput.value = '';

  const cancelBtn = document.getElementById('btn-cancelar-edicao');
  if (cancelBtn) cancelBtn.style.display = 'none';

  const saveBtn = document.getElementById('btn-salvar');
  if (saveBtn) {
    saveBtn.innerText = 'Registrar atividade';
    saveBtn.setAttribute('onclick', 'salvarAtividade(false)');
  }

  const registroMsg = document.getElementById('registro-msg');
  if (registroMsg) setRegistroMsg('');
}
